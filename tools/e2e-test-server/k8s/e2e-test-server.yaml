apiVersion: v1
kind: ConfigMap
metadata:
  name: e2e-test-config
  namespace: default
data:
  test-config.json: |
    {
      "name": "Kubernetes E2E Test Configuration",
      "description": "Test scenarios for Kubernetes-based proxy testing",
      "scenarios": [
        {
          "id": "k8s-health",
          "name": "Kubernetes Health Check",
          "path": "/test/k8s-health",
          "method": "GET",
          "response": {
            "status": 200,
            "headers": {
              "Content-Type": "application/json"
            },
            "body": {
              "status": "healthy",
              "environment": "kubernetes",
              "service": "e2e-test-server"
            }
          }
        },
        {
          "id": "k8s-proxy-test",
          "name": "Proxy Passthrough Test",
          "path": "/test/k8s-proxy-test",
          "method": "GET",
          "response": {
            "status": 200,
            "headers": {
              "Content-Type": "application/json",
              "X-Forwarded-For": "test",
              "X-Test-Backend": "e2e-test-server"
            },
            "body": {
              "status": "success",
              "message": "Request proxied successfully",
              "backend": "kubernetes"
            }
          }
        },
        {
          "id": "k8s-auth-test",
          "name": "Authentication Test",
          "path": "/test/k8s-auth-test",
          "method": "GET",
          "request": {
            "headers": {
              "Authorization": "Bearer k8s-test-token"
            }
          },
          "response": {
            "status": 200,
            "headers": {
              "Content-Type": "application/json"
            },
            "body": {
              "status": "authenticated",
              "user": "k8s-test-user",
              "roles": ["user", "tester"]
            }
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-test-server
  namespace: default
  labels:
    app: e2e-test-server
    component: testing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: e2e-test-server
  template:
    metadata:
      labels:
        app: e2e-test-server
        component: testing
    spec:
      containers:
      - name: e2e-test-server
        image: e2e-test-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8090
          protocol: TCP
        - name: https
          containerPort: 9443
          protocol: TCP
        - name: websocket
          containerPort: 8091
          protocol: TCP
        - name: graphql
          containerPort: 8092
          protocol: TCP
        env:
        - name: CONFIG_FILE
          value: "/config/test-config.json"
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: e2e-test-config
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-test-server
  namespace: default
  labels:
    app: e2e-test-server
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8090
    protocol: TCP
  - name: https
    port: 443
    targetPort: 9443
    protocol: TCP
  - name: websocket
    port: 8091
    targetPort: 8091
    protocol: TCP
  - name: graphql
    port: 8092
    targetPort: 8092
    protocol: TCP
  selector:
    app: e2e-test-server
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-test-server-headless
  namespace: default
  labels:
    app: e2e-test-server
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8090
    targetPort: 8090
    protocol: TCP
  selector:
    app: e2e-test-server

