apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-test-config
  namespace: default
data:
  proxy-config.json: |
    {
      "name": "Proxy E2E Test Configuration",
      "description": "Proxy configuration for end-to-end testing with e2e-test-server",
      "origins": [
        {
          "id": "e2e-http-test",
          "hostname": "test.local",
          "action": {
            "type": "proxy",
            "url": "http://e2e-test-server"
          }
        },
        {
          "id": "e2e-ws-test",
          "hostname": "ws.test.local",
          "action": {
            "type": "websocket",
            "url": "ws://e2e-test-server:8091"
          }
        },
        {
          "id": "e2e-graphql-test",
          "hostname": "graphql.test.local",
          "action": {
            "type": "proxy",
            "url": "http://e2e-test-server:8092"
          }
        }
      ],
      "session": {
        "enabled": true,
        "callbacks": [
          {
            "url": "http://e2e-test-server/callback/session",
            "method": "POST",
            "timeout": 5
          }
        ]
      },
      "authorization": {
        "type": "jwt",
        "jwt": {
          "secret": "test-secret-key",
          "authentication_callback": {
            "url": "http://e2e-test-server/callback/auth",
            "method": "POST",
            "timeout": 5
          }
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-test
  namespace: default
  labels:
    app: proxy-test
    component: proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proxy-test
  template:
    metadata:
      labels:
        app: proxy-test
        component: proxy
    spec:
      containers:
      - name: proxy
        image: proxy:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: CONFIG_FILE
          value: "/config/proxy-config.json"
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
      volumes:
      - name: config
        configMap:
          name: proxy-test-config
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-test
  namespace: default
  labels:
    app: proxy-test
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: proxy-test

