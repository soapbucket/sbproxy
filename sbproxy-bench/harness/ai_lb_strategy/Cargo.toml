# P99 latency comparison across AI router LB strategies under
# skewed load.
#
# Standalone Cargo manifest (NOT a workspace member) so the proxy's
# `cargo build --workspace` does not pull it in. Invoke manually:
#
#     cd sbproxy-bench/harness/ai_lb_strategy
#     SBPROXY_BENCH=1 cargo run --release -- --total-requests 50000
#
# The `SBPROXY_BENCH` env-var gate is enforced in main.rs so an
# accidental local invocation cannot eat CPU for minutes. CI does
# not run this; the perf lab does.

[workspace]

[package]
name = "ai-lb-strategy-bench"
version = "0.0.1"
edition = "2021"
publish = false
license = "Apache-2.0"

[[bin]]
name = "ai-lb-strategy-bench"
path = "src/main.rs"

[dependencies]
# Pull the live AI router so the bench measures the same code path
# the proxy uses, not a separate Rust impl that has to be kept in
# sync.
sbproxy-ai = { path = "../../../crates/sbproxy-ai" }

clap = { version = "4", features = ["derive"] }
hdrhistogram = "7"
rand = { version = "0.8", features = ["small_rng"] }
rand_distr = "0.4"
sha2 = "0.10"
anyhow = "1"
