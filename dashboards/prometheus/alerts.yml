groups:
  - name: sbproxy_alerts
    rules:
      - alert: SBProxyHighErrorRate
        expr: rate(sbproxy_requests_total{status=~"5.."}[5m]) / rate(sbproxy_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate (> 5%)"
          description: "The 5xx error rate has exceeded 5% for more than 2 minutes. Current value: {{ $value | humanizePercentage }}."

      - alert: SBProxyHighLatency
        expr: histogram_quantile(0.95, rate(sbproxy_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 2 seconds"
          description: "The P95 request latency has been above 2 seconds for 5 minutes. Current value: {{ $value | humanizeDuration }}."

      - alert: SBProxyAIProviderDown
        expr: rate(sbproxy_ai_requests_total{status="success"}[2m]) == 0 and rate(sbproxy_ai_requests_total{status="error"}[2m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "AI provider {{ $labels.provider }} returning only errors"
          description: "Provider {{ $labels.provider }} has had zero successful requests and non-zero errors for the last 2 minutes."

      - alert: SBProxyGuardrailSpike
        expr: rate(sbproxy_ai_guardrail_triggers_total{action="block"}[1m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High guardrail block rate (> 10/min)"
          description: "Guardrail blocks are firing at a high rate. Type: {{ $labels.type }}. Current rate: {{ $value }}/sec."

      - alert: SBProxyHighTokenUsage
        expr: increase(sbproxy_ai_tokens_output_total[1h]) > 1000000
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Over 1M output tokens in the last hour"
          description: "Token output has exceeded 1 million in the past hour. Provider: {{ $labels.provider }}. Count: {{ $value }}."

      # --- WOR-1493..1501: per-credential, multi-tenant value alerts ---

      - alert: SBProxyTenantSpendSpike
        expr: sum by (tenant_id) (increase(sbproxy_ai_cost_dollars_attributed_total[1h])) > 100
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} spent over $100 on AI in the last hour"
          description: "Per-tenant AI spend crossed the chargeback alert threshold. Tenant: {{ $labels.tenant_id }}. Spend: ${{ $value | printf \"%.2f\" }}."

      - alert: SBProxyCredentialSpendSpike
        expr: sum by (tenant_id, api_key_id) (increase(sbproxy_ai_cost_dollars_attributed_total[1h])) > 50
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Credential {{ $labels.api_key_id }} spent over $50 on AI in the last hour"
          description: "A single API key crossed the per-credential spend alert threshold. Tenant: {{ $labels.tenant_id }}. Credential: {{ $labels.api_key_id }}. Spend: ${{ $value | printf \"%.2f\" }}."

      - alert: SBProxyHighAIWasteRatio
        expr: sbproxy:ai_waste_ratio_by_tenant_5m > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Over 25% of tenant {{ $labels.tenant_id }} AI requests are non-served"
          description: "More than a quarter of AI requests for tenant {{ $labels.tenant_id }} ended in a guardrail block, content filter, budget block, or error for 10 minutes. Spend on these buys no served outcome. Current ratio: {{ $value | humanizePercentage }}."

      - alert: SBProxyModelLatencyP95High
        expr: sbproxy:ai_latency_p95_by_tenant_model_5m > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P95 model latency above 30s for tenant {{ $labels.tenant_id }} / {{ $labels.model }}"
          description: "Upstream model latency p95 has exceeded 30 seconds for 10 minutes. Tenant: {{ $labels.tenant_id }}. Model: {{ $labels.model }}. Current: {{ $value | humanizeDuration }}."
