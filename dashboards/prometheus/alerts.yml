groups:
  - name: sbproxy_alerts
    rules:
      - alert: SBProxyHighErrorRate
        expr: rate(sbproxy_requests_total{status=~"5.."}[5m]) / rate(sbproxy_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate (> 5%)"
          description: "The 5xx error rate has exceeded 5% for more than 2 minutes. Current value: {{ $value | humanizePercentage }}."

      - alert: SBProxyHighLatency
        expr: histogram_quantile(0.95, rate(sbproxy_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 2 seconds"
          description: "The P95 request latency has been above 2 seconds for 5 minutes. Current value: {{ $value | humanizeDuration }}."

      - alert: SBProxyAIProviderDown
        expr: rate(sbproxy_ai_requests_attributed_total{outcome="ok"}[2m]) == 0 and rate(sbproxy_ai_requests_attributed_total{outcome!="ok"}[2m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "AI provider {{ $labels.provider }} returning only errors"
          description: "Provider {{ $labels.provider }} has had zero successful requests and non-zero errors for the last 2 minutes."

      - alert: SBProxyGuardrailSpike
        expr: rate(sbproxy_ai_guardrail_triggers_total{action="block"}[1m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High guardrail block rate (> 10/min)"
          description: "Guardrail blocks are firing at a high rate. Type: {{ $labels.type }}. Current rate: {{ $value }}/sec."

      - alert: SBProxyHighTokenUsage
        expr: increase(sbproxy_ai_tokens_output_total[1h]) > 1000000
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Over 1M output tokens in the last hour"
          description: "Token output has exceeded 1 million in the past hour. Provider: {{ $labels.provider }}. Count: {{ $value }}."

      # --- WOR-1493..1501: per-credential, multi-tenant value alerts ---

      - alert: SBProxyTenantSpendSpike
        expr: sum by (tenant_id) (increase(sbproxy_ai_cost_dollars_attributed_total[1h])) > 100
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} spent over $100 on AI in the last hour"
          description: "Per-tenant AI spend crossed the chargeback alert threshold. Tenant: {{ $labels.tenant_id }}. Spend: ${{ $value | printf \"%.2f\" }}."

      - alert: SBProxyCredentialSpendSpike
        expr: sum by (tenant_id, api_key_id) (increase(sbproxy_ai_cost_dollars_attributed_total[1h])) > 50
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Credential {{ $labels.api_key_id }} spent over $50 on AI in the last hour"
          description: "A single API key crossed the per-credential spend alert threshold. Tenant: {{ $labels.tenant_id }}. Credential: {{ $labels.api_key_id }}. Spend: ${{ $value | printf \"%.2f\" }}."

      - alert: SBProxyHighAIWasteRatio
        expr: sbproxy:ai_waste_ratio_by_tenant_5m > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Over 25% of tenant {{ $labels.tenant_id }} AI requests are non-served"
          description: "More than a quarter of AI requests for tenant {{ $labels.tenant_id }} ended in a guardrail block, content filter, budget block, or error for 10 minutes. Spend on these buys no served outcome. Current ratio: {{ $value | humanizePercentage }}."

      - alert: SBProxyModelLatencyP95High
        expr: sbproxy:ai_latency_p95_by_tenant_model_5m > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P95 model latency above 30s for tenant {{ $labels.tenant_id }} / {{ $labels.model }}"
          description: "Upstream model latency p95 has exceeded 30 seconds for 10 minutes. Tenant: {{ $labels.tenant_id }}. Model: {{ $labels.model }}. Current: {{ $value | humanizeDuration }}."

      - alert: SBProxyModelHostEngineLaunchFailing
        expr: rate(sbproxy_model_host_launches_total{outcome="failed"}[10m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Model-host engine failing to launch ({{ $labels.engine }}/{{ $labels.model }})"
          description: "A local inference engine has been failing to reach Ready for 5 minutes. Check GPU VRAM, the engine binary on PATH, and weight integrity. Runbook: docs/model-host.md."

      - alert: SBProxyModelHostGpuVramNearFull
        expr: min(sbproxy_model_host_gpu_vram_bytes{kind="free"}) / 1024 / 1024 / 1024 < 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU free VRAM below 1 GiB"
          description: "The least-free GPU has under 1 GiB free for 5 minutes; the next model load may OOM or force an eviction. Consider a smaller quant or eviction: lru."

      - alert: SBProxyModelHostEvictionChurn
        expr: rate(sbproxy_model_host_evictions_total[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Model-host eviction churn"
          description: "Models are being evicted faster than one per ten seconds for 10 minutes, which means VRAM thrash between models. Pin residency (eviction: never) or add VRAM headroom."

      - alert: SBProxyModelHostLoadQueueBackedUp
        expr: max(sbproxy_model_host_load_queue_depth) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Model-host load queue backed up"
          description: "More than 20 requests have been queued waiting for a cold model to load for 5 minutes. Cold starts are not keeping up; consider keep_alive to hold the model resident."

      - alert: SBProxyAIBudgetNearExhaustion
        expr: max by (scope) (sbproxy_ai_budget_utilization_ratio) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI budget over 90% for scope {{ $labels.scope }}"
          description: "Budget utilization for {{ $labels.scope }} has been above 90% for 5 minutes. Requests start failing with budget_exceeded at 100%; raise the budget or slow the traffic."

      - alert: SBProxyAIProviderErrorBurn
        expr: sum by (provider) (rate(sbproxy_ai_requests_attributed_total{outcome!="ok"}[5m])) / sum by (provider) (rate(sbproxy_ai_requests_attributed_total[5m])) > 0.2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Provider {{ $labels.provider }} error burn above 20%"
          description: "More than 20% of requests to {{ $labels.provider }} ended in a non-ok outcome over the last 5 minutes. Check provider status and failover configuration."

      - alert: SBProxyAISpendVelocity
        expr: sum(rate(sbproxy_ai_cost_usd_micros_total[15m])) * 3600 / 1000000 > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "AI spend velocity above $10/hour"
          description: "Derived AI spend has been running above $10 per hour for 15 minutes. Tune the threshold to your budget; the unit conversion is micro-USD/s to USD/h."
