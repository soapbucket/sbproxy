# Development-only Redis configuration for the secure L2 example.
# Redis accepts TLS connections only and requires a client certificate.

bind 0.0.0.0
protected-mode yes

port 0
tls-port 6379
tls-cert-file /run/redis-tls/server.pem
tls-key-file /run/redis-tls/server.key
tls-ca-cert-file /run/redis-tls/ca.pem
tls-auth-clients yes

aclfile /run/redis-tls/users.acl
databases 16

save ""
appendonly no
dir /tmp
loglevel notice
