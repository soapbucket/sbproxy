# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Serve an open-weight model on a single cloud GPU (one NVIDIA L4)
# behind the SBproxy gateway. The walkthrough for this config lives in
# docs/use-case-serve-on-l4.md.
#
# Run (on the L4 box):
#   sbproxy examples/use-case-serve-on-l4/sb.yml
proxy:
  http_bind_port: 8080

origins:
  "ai.local":
    action:
      type: ai_proxy
      providers:
        - name: local
          # No base_url: a served provider is hosted on this box, so
          # the gateway resolves the engine's loopback port itself.
          # Writing base_url next to serve: is a config error.
          default_model: qwen3-14b
          # The provider's model list still names the serve entry
          # today; routing, budgets, and the ledger all see this id.
          models:
            - qwen3-14b
          serve:
            models:
              # A catalog id, resolved by the built-in model catalog.
              # Explicit weights source: repo, quant, file. This GGUF +
              # llama-server path is the one certified on the L4 today;
              # bare catalog ids (`model: qwen3-14b`) and the fit
              # planner's automatic quant choice (FP8 on an Ada L4,
              # Q4 GGUF on a T4) take over once catalog-driven serving
              # lands. See docs/model-host.md for the phased status.
              - model: "hf:Qwen/Qwen3-14B-GGUF:Q4_K_M"
                gguf_file: Qwen3-14B-Q4_K_M.gguf
                name: qwen3-14b
                # llama-server applies the GGUF's embedded chat template.
                extra_args: ["--jinja"]
                # Unload after 30 idle minutes so the card's VRAM is
                # free for whatever you load next.
                keep_alive: 30m
