# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Response caching.
#
# Caches upstream responses for 60 seconds. The second request for the same
# path is served from the in-memory store without contacting the upstream.
# The x-sbproxy-cache response header reports HIT on a cached serve; it is
# absent on a miss.
#
# Run:
#   make run CONFIG=examples/response-caching/sb.yml
#
# Test:
#   # First request: miss (fetched from upstream and stored; no header).
#   curl -s -D - -o /dev/null -H 'Host: cached.local' http://127.0.0.1:8080/get | grep -i x-sbproxy-cache
#   # Second request: HIT (served from cache, upstream not contacted).
#   curl -s -D - -o /dev/null -H 'Host: cached.local' http://127.0.0.1:8080/get | grep -i x-sbproxy-cache

proxy:
  http_bind_port: 8080

origins:
  "cached.local":
    action:
      type: proxy
      url: https://test.sbproxy.dev

    response_cache:
      enabled: true
      ttl_secs: 60
      cache_control: true
