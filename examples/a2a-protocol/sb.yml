# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# A2A (agent-to-agent) protocol envelope + policy.
#
# Detection runs automatically on two header signals:
#   - Content-Type: application/a2a+json (Google A2A)
#   - MCP-Method: agents.invoke           (Anthropic A2A)
# Both are recognised by the proxy without further config. The
# policy block below adds a third operator escape hatch
# (`route_glob`) so any request under `/agents/**` is also treated
# as A2A traffic, even when neither protocol header is set.
#
# When a request is detected as A2A, the `a2a` policy enforces:
#   - max_chain_depth: hard cap on hops in the call chain. Requests
#     that exceed the cap return 429 with a JSON error body.
#   - cycle_detection: by_agent_id rejects any callee that already
#     appears earlier in the chain. Cycles return 409.
#   - callee_allowlist: only the listed agent ids may be invoked
#     from this route. Off-list callees return 403.
#   - caller_denylist: any caller agent id on the list is rejected
#     up front with 403, before depth or cycle checks run.
#
# Envelope fields are passed through `X-A2A-*` headers in this
# example so the flow exercises detection and policy without
# depending on the optional body parsers (`a2a-anthropic` /
# `a2a-google` cargo features). See README.md for the spec
# instability caveat.
#
# Run:
#   make run CONFIG=examples/a2a-protocol/sb.yml
#
# Test:
#   # Allowed callee, depth 1, no cycle - passes through to the
#   # upstream (which answers 404 for /agents/*; see README.md)
#   curl -i -H 'Host: a2a.local' \
#        -H 'Content-Type: application/a2a+json' \
#        -H 'X-A2A-Caller-Agent-Id: agent:caller' \
#        -H 'X-A2A-Callee-Agent-Id: agent:openai:gpt-5' \
#        -H 'X-A2A-Task-Id: task-1' \
#        -H 'X-A2A-Chain-Depth: 1' \
#        http://127.0.0.1:8080/agents/invoke
#
#   # 429 - chain depth exceeded (limit 3, depth 7)
#   curl -i -H 'Host: a2a.local' \
#        -H 'Content-Type: application/a2a+json' \
#        -H 'X-A2A-Caller-Agent-Id: agent:caller' \
#        -H 'X-A2A-Callee-Agent-Id: agent:openai:gpt-5' \
#        -H 'X-A2A-Chain-Depth: 7' \
#        http://127.0.0.1:8080/agents/invoke
#
#   # 403 - caller is on the denylist
#   curl -i -H 'Host: a2a.local' \
#        -H 'Content-Type: application/a2a+json' \
#        -H 'X-A2A-Caller-Agent-Id: agent:bad:actor' \
#        -H 'X-A2A-Callee-Agent-Id: agent:openai:gpt-5' \
#        -H 'X-A2A-Chain-Depth: 1' \
#        http://127.0.0.1:8080/agents/invoke
#
#   # 403 - callee is not on the allowlist
#   curl -i -H 'Host: a2a.local' \
#        -H 'Content-Type: application/a2a+json' \
#        -H 'X-A2A-Caller-Agent-Id: agent:caller' \
#        -H 'X-A2A-Callee-Agent-Id: agent:unknown' \
#        -H 'X-A2A-Chain-Depth: 1' \
#        http://127.0.0.1:8080/agents/invoke
#
#   # Pass-through - operator route_glob match (no A2A headers, path
#   # under /agents; the upstream itself answers 404)
#   curl -i -H 'Host: a2a.local' http://127.0.0.1:8080/agents/ping

proxy:
  http_bind_port: 8080

origins:
  "a2a.local":
    action:
      type: proxy
      url: https://test.sbproxy.dev

    policies:
      - type: a2a
        # Hard ceiling on hops. The runtime clamps any value above 32
        # to 32 (the memory bound on chain reconstruction). 3 is a
        # tight choice for this demo; 5 is the policy default.
        max_chain_depth: 3
        # Treat any callee already present in the chain as a cycle,
        # regardless of which method or request id is replayed. The
        # other modes are `strict` (exact agent_id + request_id pair)
        # and `by_callable_endpoint` (agent_id + endpoint).
        cycle_detection: by_agent_id
        # Only these agents may be invoked from this route. Empty
        # list disables the check.
        callee_allowlist:
          - "agent:openai:gpt-5"
          - "agent:anthropic:claude-4"
        # Callers on this list never get past the policy. Empty list
        # disables the check.
        caller_denylist:
          - "agent:bad:actor"
        # Operator escape hatch: any request whose path matches this
        # glob is treated as A2A traffic even when the
        # protocol-detection headers are absent. `**` matches any
        # suffix; `*` matches a single segment.
        route_glob: "/agents/**"
