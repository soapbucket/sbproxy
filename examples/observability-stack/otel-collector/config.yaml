# OpenTelemetry collector config for the SBproxy reference stack.
#
# This is the single OTLP ingress that SBproxy points at. The collector
# fans signals out: traces -> Tempo (OTLP), metrics -> Prometheus (remote
# write), logs -> Loki (otlphttp). Each pipeline is written explicitly so
# operators can disable one without affecting the others.

receivers:
  otlp:
    protocols:
      grpc:
        # Listen on all interfaces inside the container; host port 4327
        # forwards here. Safe inside the Compose network only.
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Bound queue depth so a slow downstream cannot OOM the collector.
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Cost-aware tail sampling mirror. SBproxy applies source-side parent-based
  # sampling and span-end keep overrides from proxy.observability.telemetry.
  # This backend policy is a second line of defense once traces reach the
  # collector: errors (span status ERROR), slow requests, and a probabilistic
  # base rate for the rest. Mirror keep_over_budget_usd / keep_slower_than_secs
  # from the proxy's telemetry config here.
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    policies:
      - name: keep-errors
        type: status_code
        status_code: { status_codes: [ERROR] }
      - name: keep-slow
        type: latency
        latency: { threshold_ms: 2000 }
      - name: base-rate
        type: probabilistic
        probabilistic: { sampling_percentage: 100 }

exporters:
  # Traces -> Tempo via OTLP gRPC inside the bridge network.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Metrics -> Prometheus via remote_write. Prometheus has
  # `--web.enable-remote-write-receiver` set in docker-compose.yml so
  # this is supported without a separate Push gateway.
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true

  # Logs -> Loki via the otlphttp exporter. Loki 3.x accepts native OTLP
  # at /otlp; no Promtail or Fluent Bit needed.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Traces -> Arize Phoenix (WOR-1227), the LLM-native backend that renders
  # SBproxy AI spans as full generations. Phoenix accepts OTLP HTTP on 6006.
  # The x-project-name header pre-provisions/routes traces into a stable
  # Phoenix project instead of the default bucket.
  otlphttp/phoenix:
    endpoint: http://phoenix:6006
    headers:
      x-project-name: "SBproxy LLM Traces"
    tls:
      insecure: true

  # Traces -> Langfuse, the second LLM-native backend in this stack.
  # Langfuse accepts OTLP over HTTP only; Basic auth matches the seeded
  # LANGFUSE_INIT_PROJECT_PUBLIC_KEY/SECRET_KEY from docker-compose.yml.
  otlphttp/langfuse:
    endpoint: http://langfuse-web:3000/api/public/otel
    headers:
      Authorization: "Basic ${env:LANGFUSE_OTEL_BASIC_AUTH}"
      x-langfuse-ingestion-version: "4"

# The collector publishes its own self-metrics on :8888 so Prometheus can
# scrape it directly (see prometheus.yml).
service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      # tail_sampling must run before batch so the keep/drop decision sees
      # the whole trace. Fans out to Tempo (general traces), Phoenix, and
      # Langfuse (LLM-native rendering of the AI spans).
      processors: [memory_limiter, tail_sampling, batch]
      exporters: [otlp/tempo, otlphttp/phoenix, otlphttp/langfuse]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
