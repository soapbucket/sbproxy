apiVersion: 1

# Grafana dashboard provider for the reference stack.
#
# This loads every JSON file under /etc/grafana/provisioning/dashboards/
# at startup, scanning subdirectories. docker-compose.yml mounts the
# SBproxy dashboards from ../../deploy/dashboards/ (overview, per-agent,
# policy triggers, audit log, traces overview, boilerplate stripping,
# content shapes, licensing edits) into the sbproxy/ subdirectory here.

providers:
  - name: sbproxy-reference
    orgId: 1
    folder: SBproxy
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
