# Prometheus config for the SBproxy reference observability stack.
#
# Scrape interval and evaluation interval are deliberately matched so
# every alerting rule sees the same sample frequency it was tuned
# against. 15s is the default for SBproxy dashboards and burn-rate alerts.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: sbproxy-obs-stack-reference

scrape_configs:

  # Prometheus self-monitoring. Useful when debugging the stack itself.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # SBproxy /metrics endpoint.
  #
  # sbproxy serves Prometheus /metrics on its data-plane listener
  # (proxy.http_bind_port, unauthenticated) and on the admin port
  # (behind the admin basic auth). The reference stack assumes sbproxy
  # runs on the host (not inside this compose project) with the usual
  # `http_bind_port: 8080`, so we scrape the data plane there.
  # `host.docker.internal` resolves to the host on Docker Desktop and on
  # recent Linux Docker (with extra_hosts: host-gateway). When you wire a
  # real sbproxy container into a shared compose network, replace the
  # target with `sbproxy:8080` (or whatever your data-plane port is)
  # and remove `host.docker.internal`.
  - job_name: sbproxy
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: sbproxy
          # Cardinality stays bounded: instance/host labels are added
          # at scrape time, never at the application.

  # OpenTelemetry collector self-metrics. The collector exposes its own
  # Prometheus scrape endpoint on :8888 by default; useful for tracking
  # dropped spans and queue health.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
