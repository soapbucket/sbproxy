# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# The "after" side of the migration pair: the exact output of
#
#   sbproxy config import-litellm examples/migrate-litellm/config.yaml
#
# with comments added. Strip the comments and you get the importer's output
# byte for byte:
#
#   diff <(sbproxy config import-litellm config.yaml 2>/dev/null) \
#        <(grep -vE '^[[:space:]]*(#|$)' sb.yml)
#
# The importer also printed two warnings for this input (max_budget and
# master_key); the comments below say where each one lands.
origins:
  # The importer emits a single ai_proxy origin under the placeholder host
  # ai.local. Send requests with -H 'Host: ai.local', or rename the key to
  # your real hostname.
  ai.local:
    action:
      # From litellm_params.rpm / tpm on the gpt-4 entry, keyed by the
      # public model name.
      model_rate_limits:
        gpt-4:
          requests_per_minute: 100
          tokens_per_minute: 200000
      # One provider per model_list entry. os.environ/VAR became ${VAR}
      # interpolation, so no secret lands in the file.
      providers:
      - api_key: ${OPENAI_API_KEY}
        # model_name from config.yaml is the public, routable name...
        default_model: gpt-4
        # ...and model_map sends it to the upstream model from
        # litellm_params.model (the part after the provider prefix).
        model_map:
          gpt-4: gpt-4o-mini
        models:
        - gpt-4
        # The prefix of litellm_params.model ("openai/...") became the
        # provider name and provider_type.
        name: openai
        provider_type: openai
      - api_key: ${ANTHROPIC_API_KEY}
        default_model: claude
        model_map:
          claude: claude-haiku-4-5
        models:
        - claude
        name: anthropic
        provider_type: anthropic
        # config.yaml also set max_budget on this entry. That key has no
        # automatic mapping, so the importer warned instead of emitting
        # anything. The manual follow-up is an action-level budget block:
        #
        #   budget:
        #     on_exceed: block
        #     limits:
        #       - scope: workspace
        #         max_cost_usd: 25.0
        #         period: monthly
        #
        # See examples/ai-budget/sb.yml and docs/configuration.md.
      # router_settings.routing_strategy: latency-based-routing.
      routing: lowest_latency
      # litellm_settings.cache: true. Tuning is left to defaults.
      semantic_cache:
        enabled: true
      type: ai_proxy
      # general_settings.master_key was the second warning. SBproxy has no
      # master key; client keys are declared in config instead, either as
      # action-level virtual_keys or as a credentials block. See
      # examples/ai-virtual-keys/sb.yml and docs/configuration.md.
proxy:
  http_bind_port: 8080
