# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# AI gateway: fallback chain across providers.
#
# Providers are listed in priority order. With routing.strategy
# fallback_chain, the proxy tries the highest-priority provider first and
# advances to the next when an attempt fails at the transport level
# (connection refused, DNS failure, timeout) or returns a retriable 5xx
# (500, 502, 503). From the client's perspective the call simply succeeds.
#
# Here the primary points at a closed local port to simulate an outage, so
# every request fails over to the live backup. Swap the primary's base_url
# for a real upstream in production and keep the backup as a warm spare.
#
# Note: a 4xx such as 401 (bad key) is treated as a client error and is NOT
# retried on another provider; only transport failures and 5xx advance the
# chain.
#
# Setup:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   make run CONFIG=examples/ai-routing-fallback/sb.yml
#
# Test:
#   curl -s http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' -H 'Content-Type: application/json' \
#     -d '{"model":"claude-haiku-4-5","messages":[{"role":"user","content":"In one sentence, what is a reverse proxy?"}]}' \
#     | jq -r '.model, .choices[0].message.content'
#
#   # The primary attempt is visible in the proxy log:
#   #   AI proxy: upstream request failed ... provider=primary-unreachable

proxy:
  http_bind_port: 8080

origins:
  "ai.local":
    action:
      type: ai_proxy
      routing:
        strategy: fallback_chain

      providers:
        # Priority 1: simulated outage. The base_url points at a closed
        # local port, so the connection is refused and the chain advances.
        - name: primary-unreachable
          provider_type: anthropic
          api_key: ${ANTHROPIC_API_KEY}
          base_url: http://127.0.0.1:9
          allow_private_base_url: true
          priority: 1
          default_model: claude-haiku-4-5
          models:
            - claude-haiku-4-5

        # Priority 2: live backup that serves the request.
        - name: anthropic-backup
          provider_type: anthropic
          api_key: ${ANTHROPIC_API_KEY}
          priority: 2
          default_model: claude-haiku-4-5
          models:
            - claude-haiku-4-5
