# Stand-in origin for the 30-rail-x402-base-sepolia example. Serves
# a single article HTML page on `/article` so the proxy has something
# real to forward once a paid request flows through.

server {
    listen 80;
    server_name _;

    # --- Article body ---
    location = /article {
        default_type text/html;
        return 200 '<!doctype html>\n<html><head><title>x402 demo article</title></head><body>\n<h1>x402 Article</h1>\n<p>This page is gated behind an x402 payment challenge. Cooperative crawlers see a 402 with the multi-rail body before they ever reach this origin.</p>\n</body></html>\n';
    }

    # --- Health probe ---
    location = /__health {
        default_type text/plain;
        return 200 'ok\n';
    }
}
