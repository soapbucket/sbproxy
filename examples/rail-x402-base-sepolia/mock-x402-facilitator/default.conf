# Mock x402 facilitator. Stands in for the LF-stewarded Base Sepolia
# facilitator so the example runs end-to-end without testnet keys.
#
# Endpoint surface:
#
#   GET  /supported              -> 200 with `{"chains":["base","base-sepolia"]}`
#   POST /verify                 -> 200 with `{"valid":true}`
#   POST /settle[?reorg=depth=N] -> 200 with `{"settled":true,"txhash":"0x...",
#                                              "reorg_depth": N}` when N is set
#   GET  /__health               -> 200 (compose health probe)
#
# Anything else returns 404 so misconfigured clients fail loudly.
#
# `?reorg=depth=N`:
#   The mock echoes the reorg depth back into the response so the
#   README walkthrough can demonstrate how the proxy handles a
#   transient reorg report. The proxy itself does not interpret the
#   field today (Wave 3); it lives in the mock for parity with
#   future settlement logic.

server {
    listen 80;
    server_name _;

    # --- supported ---
    location = /supported {
        default_type application/json;
        return 200 '{"chains":["base","base-sepolia"],"assets":["USDC","USDT"]}\n';
    }

    # --- verify ---
    #
    # The real facilitator validates the EIP-3009 signature; the mock
    # always accepts so the redeem path never blocks the demo. Replace
    # with the LF endpoint when you want real signature checks.
    location = /verify {
        if ($request_method != POST) {
            return 405;
        }
        default_type application/json;
        return 200 '{"valid":true,"reason":"mock-accept-all"}\n';
    }

    # --- settle ---
    #
    # Synthesises a fake `txhash` so the agent has something to log.
    # The `?reorg=depth=N` query parameter lets the README simulate a
    # reorg without a real chain.
    location = /settle {
        if ($request_method != POST) {
            return 405;
        }
        default_type application/json;
        # Echo `reorg=depth=N` from the query string back to the
        # caller. nginx exposes the raw query as $args; the mock body
        # uses a static stub when reorg is absent so callers without
        # the parameter see the happy-path shape.
        if ($args ~* "reorg=depth=([0-9]+)") {
            set $reorg_depth $1;
            return 200 '{"settled":true,"txhash":"0xMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCK","reorg_depth":$reorg_depth}\n';
        }
        return 200 '{"settled":true,"txhash":"0xMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCKMOCK"}\n';
    }

    # --- health ---
    location = /__health {
        default_type text/plain;
        return 200 'ok\n';
    }
}
