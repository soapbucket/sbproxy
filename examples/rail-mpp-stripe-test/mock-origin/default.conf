# Stand-in origin for the 31-rail-mpp-stripe-test example. Serves a
# Markdown feed entry on `/feed/*` so the proxy has something real to
# forward once a paid request flows through.

server {
    listen 80;
    server_name _;

    # --- Markdown feed (matches the policy's tier route_pattern) ---
    location ~ ^/feed/.*$ {
        default_type text/markdown;
        return 200 '# Feed entry\n\nMarkdown-shaped content. Charged at the MPP tier.\n\nThis page is gated behind a Stripe MPP payment challenge.\n';
    }

    # --- Health probe ---
    location = /__health {
        default_type text/plain;
        return 200 'ok\n';
    }
}
