# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# CAP token authentication (Wave 6 / R6.1).
#
# Validates Crawler Authorization Protocol (CAP) tokens on every request.
# Tokens are EdDSA-signed JWTs bound to an agent identity, an audience
# (request Host), and a route allow-list (`glob` claim). The verifier
# trusts the public keys configured under `jwks_static` below; in
# production point `jwks_url` at the issuer's well-known JWKS endpoint
# instead so signing keys can rotate without a config reload.
#
# Clients pass the token in either of the documented headers:
#   CAP-Token: <jwt>
#   Authorization: CAP <jwt>
#
# Run:
#   make run CONFIG=examples/auth-cap/sb.yml
#
# Mint a sample token (uses tokens/test-private.pem):
#   python3 examples/auth-cap/mint.py > /tmp/cap.jwt
#
# Test:
#   # 401 - missing token
#   curl -i -H 'Host: cap.localhost' http://127.0.0.1:8080/blog/article
#
#   # 200 - valid token, glob match
#   curl -i -H 'Host: cap.localhost' \
#        -H "CAP-Token: $(cat /tmp/cap.jwt)" \
#        http://127.0.0.1:8080/blog/article
#
#   # 403 - same token, path outside the /blog/** glob
#   curl -i -H 'Host: cap.localhost' \
#        -H "CAP-Token: $(cat /tmp/cap.jwt)" \
#        http://127.0.0.1:8080/api/private

proxy:
  http_bind_port: 8080

origins:
  "cap.localhost":
    action:
      type: proxy
      url: https://test.sbproxy.dev

    authentication:
      type: cap
      # Inline JWKS document. Holds one Ed25519 public key whose
      # private half is shipped (TEST KEY ONLY) under tokens/. In
      # production replace this block with `jwks_url` and let the
      # verifier fetch the issuer's well-known JWKS endpoint instead:
      #
      #   jwks_url: https://issuer.example.com/.well-known/cap/keys.json
      #
      # The kid below matches the one mint.py stamps into the JWT
      # header so the verifier can pick the right key.
      jwks_static:
        keys:
          - kty: OKP
            crv: Ed25519
            kid: cap-2026-q2-001
            alg: EdDSA
            x: M72oLN0HYDBbFzAcHlECY-qTs_f9TnftFt3rquCMJI4
      # Optional explicit audience override. When unset the verifier
      # accepts any `aud` that matches the request Host header, which
      # is the typical operator deployment shape; we leave it unset
      # here so the bundled token (aud: cap.localhost) round-trips.
