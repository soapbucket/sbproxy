# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# AI gateway: cost-optimised routing with weighted scoring.
#
# The cost_optimized strategy scores each provider as
# `in_flight_requests * 1000 + weight` and routes to the lowest score.
# Cheaper providers get a lower weight so they win ties when load is
# balanced; more expensive providers get a higher weight so they only
# run once cheaper providers are saturated.
#
# Three providers are configured here, all declaring the same logical
# model (claude-haiku-4-5) so every request can land on any of them;
# model_map rewrites the logical name to what each upstream serves:
#   - openrouter (weight 1): the cheapest path to a Haiku-class model,
#     mapped to anthropic/claude-3-haiku.
#   - anthropic-haiku (weight 5): direct Anthropic Haiku, slightly
#     pricier than OpenRouter resale but lower latency.
#   - anthropic-sonnet (weight 50): mapped to claude-sonnet-4-5, so
#     the spare tier picked when both Haiku routes are loaded serves
#     the pricier model.
#
# Setup:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   export OPENROUTER_API_KEY=sk-or-...
#
# Run:
#   make run CONFIG=examples/ai-cost-optimized/sb.yml
#
# Test:
#   curl http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "model": "claude-haiku-4-5",
#       "messages": [{"role": "user", "content":
#         "Hello! Which provider served this?"}]
#     }'
#
# Expected behaviour:
#   When traffic is light, openrouter wins every request. As OpenRouter
#   in-flight requests climb, anthropic-haiku starts taking traffic. If
#   both Haiku routes saturate, anthropic-sonnet is selected. The
#   sbproxy_ai_requests_total counter, broken down by provider, makes
#   the distribution visible.

proxy:
  http_bind_port: 8080

origins:
  "ai.local":
    action:
      type: ai_proxy
      routing:
        strategy: cost_optimized

      providers:
        - name: openrouter
          api_key: ${OPENROUTER_API_KEY}
          weight: 1
          default_model: anthropic/claude-3-haiku
          # Serves the shared logical model; model_map rewrites it to
          # the OpenRouter alias on the way out, and the response's
          # `model` field reports that alias.
          models:
            - claude-haiku-4-5
          model_map:
            claude-haiku-4-5: anthropic/claude-3-haiku

        - name: anthropic-haiku
          provider_type: anthropic
          api_key: ${ANTHROPIC_API_KEY}
          weight: 5
          default_model: claude-haiku-4-5
          models:
            - claude-haiku-4-5

        - name: anthropic-sonnet
          provider_type: anthropic
          api_key: ${ANTHROPIC_API_KEY}
          weight: 50
          default_model: claude-sonnet-4-5
          # Also serves the shared logical model, upgraded to Sonnet:
          # the expensive spare tier only runs when the cheap routes
          # are saturated.
          models:
            - claude-haiku-4-5
          model_map:
            claude-haiku-4-5: claude-sonnet-4-5
