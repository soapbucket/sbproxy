# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Host header override.
#
# By default the proxy sends the upstream URL's hostname in the `Host`
# header (so vhost-routed services like Vercel, Cloudflare-fronted
# origins, S3 website endpoints, and AWS ALBs work without extra
# configuration). When the upstream expects a different `Host` than
# its DNS name (CDN-fronted services, multi-tenant SaaS), set
# `host_override` to the value the upstream wants to see.
#
# Whenever the proxy rewrites `Host`, it also sets `X-Forwarded-Host`
# to the client's original `Host` so the upstream can still observe
# the public name. Suppress that with `disable_forwarded_host_header:
# true` if needed.
#
# This example accepts requests for `api.local` and overrides the
# upstream `Host` to `test.sbproxy.dev`. That is the only Host the
# shared test upstream serves (it routes by Host), so the override is
# what makes the demo work; in production the override is typically a
# vanity or tenant hostname that differs from the upstream DNS name.
#
# Run:
#   make run CONFIG=examples/host-override/sb.yml
#
# Test:
#   curl -s -H 'Host: api.local' http://127.0.0.1:8080/headers | jq '.headers.host'
#   # "test.sbproxy.dev"   <- the overridden Host, as seen by the upstream

proxy:
  http_bind_port: 8080

origins:
  "api.local":
    action:
      type: proxy
      url: https://test.sbproxy.dev
      host_override: test.sbproxy.dev
