# Response caching.
#
# Caches upstream responses for 60 seconds. The second request for the same
# path is served from the in-memory store without contacting the upstream.
# Look at the response time difference between the first and second curl.
#
# Run:
#   make run CONFIG=examples/03-response-caching/sb.yml
#
# Test:
#   time curl -s -H 'Host: cached.local' http://127.0.0.1:8080/delay/2 -o /dev/null
#   time curl -s -H 'Host: cached.local' http://127.0.0.1:8080/delay/2 -o /dev/null
#   # First call ~2s. Second call sub-ms (cache hit).

proxy:
  http_bind_port: 8080

origins:
  "cached.local":
    action:
      type: proxy
      url: https://httpbin.org

    response_cache:
      enabled: true
      ttl_seconds: 60
      cache_control: true
