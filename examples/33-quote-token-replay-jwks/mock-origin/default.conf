# Stand-in origin for the 33-quote-token-replay-jwks example. Serves
# a single article on `/article` so the proxy has something to forward
# once a paid request flows through.

server {
    listen 80;
    server_name _;

    location = /article {
        default_type text/html;
        return 200 '<!doctype html>\n<html><head><title>JWKS demo</title></head><body>\n<h1>JWKS / Replay Article</h1>\n<p>This page is gated behind a quote-token JWS. The example demonstrates the JWKS endpoint, single-use enforcement, and the replay-protection 409.</p>\n</body></html>\n';
    }

    location = /__health {
        default_type text/plain;
        return 200 'ok\n';
    }
}
