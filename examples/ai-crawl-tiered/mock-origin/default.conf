# Stand-in origin for the 24-ai-crawl-tiered example. Serves three
# canned responses keyed off the path the proxy forwards to it:
#
#   /preview/article  -> short HTML excerpt (free tier)
#   /feed/articles/*  -> Markdown feed entry (markdown tier)
#   /article          -> full HTML article (html tier)
#
# Anything else returns 404 so a misrouted request fails loudly.

server {
    listen 80;
    server_name _;

    # --- Free preview: tier 1 ---
    location /preview/article {
        default_type text/html;
        return 200 '<!doctype html>\n<html><body>\n<h1>Preview</h1>\n<p>First paragraph only. Pay to read the rest.</p>\n</body></html>\n';
    }

    # --- Feed (markdown shape): tier 2 ---
    location ~ ^/feed/articles/.*$ {
        default_type text/markdown;
        return 200 '# Feed entry\n\nMarkdown-shaped content. Charged at the markdown tier.\n';
    }

    # --- Full article (html): tier 3 ---
    location = /article {
        default_type text/html;
        return 200 '<!doctype html>\n<html><body>\n<h1>Article</h1>\n<p>Full article body. Charged at the html tier.</p>\n</body></html>\n';
    }

    # --- Health probe (used by docker-compose healthcheck) ---
    location = /__origin_health {
        default_type text/plain;
        return 200 'ok\n';
    }
}
