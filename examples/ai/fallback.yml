# AI Gateway with Fallback Chain
#
# Tries OpenAI first. If it fails (5xx or timeout), automatically retries
# with Anthropic. Includes context window validation to prevent oversized
# requests and automatic model fallback for large prompts.
#
# Test:
#   curl -H "Host: ai.example.com" -X POST http://localhost:8080/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model": "gpt-4o-mini", "messages": [{"role": "user", "content": "Hello"}]}'
#
# Check the X-SBProxy-Provider header to see which provider handled the request.
#
# Requires: OPENAI_API_KEY, ANTHROPIC_API_KEY environment variables

proxy:
  http_bind_port: 8080

origins:
  "ai.example.com":
    action:
      type: ai_proxy
      providers:
        - name: openai
          api_key: ${OPENAI_API_KEY}
          models: [gpt-4o, gpt-4o-mini, gpt-4-turbo]
        - name: anthropic
          api_key: ${ANTHROPIC_API_KEY}
          models: [claude-sonnet-4-20250514, claude-3-5-haiku-20241022]
      default_model: gpt-4o-mini
      routing:
        strategy: fallback_chain
        fallback_order: [openai, anthropic]
        retry:
          max_attempts: 3
        context_window_margin: 0.05
        context_fallbacks:
          gpt-4o: gpt-4-turbo
    authentication:
      type: api_key
      api_keys:
        - ${AI_GATEWAY_KEY}
    policies:
      - type: rate_limit
        requests_per_minute: 200
