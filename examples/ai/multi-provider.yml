# Multi-Provider AI Gateway
#
# Routes requests across OpenAI and Anthropic with weighted distribution.
# Cost and usage headers are included in every response.
#
# Test:
#   curl -H "Host: ai.example.com" -X POST http://localhost:8080/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model": "gpt-4o-mini", "messages": [{"role": "user", "content": "Hello"}]}'
#
# Requires: OPENAI_API_KEY, ANTHROPIC_API_KEY environment variables

proxy:
  http_bind_port: 8080

origins:
  "ai.example.com":
    action:
      type: ai_proxy
      providers:
        - name: openai
          api_key: ${OPENAI_API_KEY}
          models: [gpt-4o, gpt-4o-mini, gpt-4-turbo]
        - name: anthropic
          api_key: ${ANTHROPIC_API_KEY}
          models: [claude-sonnet-4-20250514, claude-3-5-haiku-20241022]
      default_model: gpt-4o-mini
      routing:
        strategy: weighted
