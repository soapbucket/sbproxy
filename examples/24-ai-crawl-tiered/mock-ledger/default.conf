# Mock HTTP ledger stub. Implements the redeem endpoint shape from
# `docs/adr-http-ledger-protocol.md` well enough that the synthetic
# probe and any operator demo can hit it without standing up a real
# ledger backend. The OSS build of `ai_crawl_control` ships an
# in-memory ledger; this service exists for two reasons:
#
#   1. To make the example bundle look like the production deployment
#      shape (proxy + external ledger + origin) so operators can swap
#      in their real ledger by changing one URL.
#   2. To give the synthetic-nightly probe (`bench-synthetic --rail=none`)
#      a stable target it can hit when the bundle is brought up locally
#      against a future `http-ledger`-feature build of the proxy.
#
# Endpoint semantics:
#
#   POST /v1/ledger/redeem
#     -> 200 OK with `{"v":1, "result":{"redeemed":true, ...}}`
#
#   GET  /v1/ledger/health
#     -> 200 OK with `{"status":"ok"}`
#
# Any other path returns 404. Idempotency-Key + signature headers are
# accepted but not validated; the mock never replays.

server {
    listen 80;
    server_name _;

    # --- redeem ---
    location = /v1/ledger/redeem {
        # Only POST is meaningful for redeem. Reject everything else
        # so misconfigured clients fail loudly instead of getting a
        # silent 200 on a GET.
        if ($request_method != POST) {
            return 405;
        }
        default_type application/json;
        # The shape mirrors `e2e/tests/http_ledger.rs::handle_redeem`'s
        # happy-path response so the e2e harness contract stays
        # documented in the bundle for free.
        return 200 '{"v":1,"request_id":"01HZX0000000000000000MOCK","result":{"redeemed":true,"redemption_id":"red_mock_0001","remaining_balance_micros":900000}}\n';
    }

    # --- health ---
    location = /v1/ledger/health {
        default_type application/json;
        return 200 '{"status":"ok"}\n';
    }

    # Top-level health for compose's healthcheck wget.
    location = /__ledger_health {
        default_type text/plain;
        return 200 'ok\n';
    }
}
