# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# AI gateway: per-team virtual keys.
#
# Two virtual keys split traffic between teams. The frontend team is
# allow-listed to Haiku only; the data team also gets Sonnet. A key
# that requests a model outside its allow-list is rejected with 403
# before any upstream call. Each credential also declares a budget and
# tags that surface in the sbproxy_ai_key_* metrics so dashboards can
# attribute spend per team. Clients send their virtual key in the
# Authorization header; the gateway matches it locally and swaps in the
# real upstream key before the call.
#
# Setup:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   export TEAM_FRONTEND_KEY=vk-frontend-...
#   export TEAM_DATA_KEY=vk-data-...
#
# Run:
#   make run CONFIG=examples/ai-virtual-keys/sb.yml
#
# Test (frontend team, allowed model):
#   curl http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' \
#     -H "Authorization: Bearer ${TEAM_FRONTEND_KEY}" \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "model": "claude-3-5-haiku-latest",
#       "messages": [{"role": "user", "content": "Hello from frontend."}]
#     }'
#
# Test (frontend team, blocked model, expect 403):
#   curl http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' \
#     -H "Authorization: Bearer ${TEAM_FRONTEND_KEY}" \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "model": "claude-3-5-sonnet-latest",
#       "messages": [{"role": "user", "content": "Try Sonnet."}]
#     }'
#
# Test (data team, allowed Sonnet):
#   curl http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' \
#     -H "Authorization: Bearer ${TEAM_DATA_KEY}" \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "model": "claude-3-5-sonnet-latest",
#       "messages": [{"role": "user", "content": "Hello from data team."}]
#     }'
#
# Expected behaviour:
#   The frontend key is rejected with 403 for Sonnet (not on its
#   models.allow list); the data key gets both Haiku and Sonnet.
#   Requests are tagged in the sbproxy_ai_key_* counters by name and
#   tags for per-team attribution. The per-credential budget and
#   rate_limit below are attribution metadata, not per-key enforced
#   limits: configure enforced ceilings at the action level (an action
#   `budget:` block and rate-limit policies). See docs/ai-gateway.md.

proxy:
  http_bind_port: 8080

origins:
  "ai.local":
    action:
      type: ai_proxy
      routing: round_robin

      providers:
        - name: anthropic
          # Secrets use ${ENV_VAR} interpolation here to stay runnable.
          # In production any secret (this key and the virtual keys
          # below) can instead be a vault reference, e.g.
          #   api_key: vault://hashi/secret/data/anthropic-prod?key=api_key
          # backed by HashiCorp Vault, AWS Secrets Manager, or K8s
          # Secrets. See docs/secrets.md.
          api_key: ${ANTHROPIC_API_KEY}
          default_model: claude-3-5-haiku-latest
          models:
            - claude-3-5-haiku-latest
            - claude-3-5-sonnet-latest

    # Per-team credentials. Each credential's `models.allow` is an
    # enforced per-key gate: a request for a model outside the list
    # gets a 403. The `attrs.budget` and `policies.rate_limit` blocks
    # are attribution metadata on the matched key, not per-key enforced
    # ceilings; set enforced limits at the action level.
    credentials:
      - name: team-frontend
        type: ai_provider
        provider: anthropic
        key: ${TEAM_FRONTEND_KEY}
        attrs:
          project: frontend
          tags: [team-frontend, tier-haiku]
          budget:
            max_tokens: 500000
            max_cost_usd: 10
        models:
          allow: [claude-3-5-haiku-latest]
        policies:
          - type: rate_limit
            rpm: 30
            tpm: 60000

      - name: team-data
        type: ai_provider
        provider: anthropic
        key: ${TEAM_DATA_KEY}
        attrs:
          project: data
          tags: [team-data, tier-sonnet]
          budget:
            max_tokens: 10000000
            max_cost_usd: 250
        models:
          allow:
            - claude-3-5-haiku-latest
            - claude-3-5-sonnet-latest
        policies:
          - type: rate_limit
            rpm: 120
            tpm: 400000
