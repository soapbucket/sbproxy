# AI gateway: per-team virtual keys.
#
# Two virtual keys split traffic between teams. The frontend team is
# capped to a Haiku-only allow-list, modest RPM, and a small budget.
# The data team gets Sonnet plus Haiku, a higher RPM, and a larger
# budget. Tags surface in the sbproxy_ai_key_* metrics so dashboards
# can attribute spend per team. Clients send their virtual key in the
# Authorization header; the proxy validates it locally before any
# upstream call.
#
# Setup:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   export TEAM_FRONTEND_KEY=vk-frontend-...
#   export TEAM_DATA_KEY=vk-data-...
#
# Run:
#   make run CONFIG=examples/ai-virtual-keys/sb.yml
#
# Test (frontend team, allowed model):
#   curl http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' \
#     -H "Authorization: Bearer ${TEAM_FRONTEND_KEY}" \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "model": "claude-3-5-haiku-latest",
#       "messages": [{"role": "user", "content": "Hello from frontend."}]
#     }'
#
# Test (frontend team, blocked model, expect 403):
#   curl http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' \
#     -H "Authorization: Bearer ${TEAM_FRONTEND_KEY}" \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "model": "claude-3-5-sonnet-latest",
#       "messages": [{"role": "user", "content": "Try Sonnet."}]
#     }'
#
# Test (data team, allowed Sonnet):
#   curl http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' \
#     -H "Authorization: Bearer ${TEAM_DATA_KEY}" \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "model": "claude-3-5-sonnet-latest",
#       "messages": [{"role": "user", "content": "Hello from data team."}]
#     }'
#
# Expected behaviour:
#   The frontend key is rejected for Sonnet (not in allowed_models) and
#   for any path through OpenRouter (not in allowed_providers). Frontend
#   throughput is capped at 30 RPM and 60k TPM with a $10 budget. The data
#   key gets Sonnet plus Haiku at 120 RPM and 400k TPM with a $250 budget.
#   Requests are tagged in the sbproxy_ai_key_* counters by name and tags.

proxy:
  http_bind_port: 8080

origins:
  "ai.local":
    action:
      type: ai_proxy
      routing: round_robin

      providers:
        - name: anthropic
          api_key: ${ANTHROPIC_API_KEY}
          default_model: claude-3-5-haiku-latest
          models:
            - claude-3-5-haiku-latest
            - claude-3-5-sonnet-latest

    # Per-team credentials. Migrated from the legacy
    # `action.virtual_keys:` shape to the unified credentials block.
    # The compile-time lowering materialises each `ai_provider`
    # credential as a virtual-key entry on the AI handler so the
    # runtime dispatch keeps working unchanged.
    credentials:
      - name: team-frontend
        type: ai_provider
        provider: anthropic
        key: ${TEAM_FRONTEND_KEY}
        attrs:
          project: frontend
          tags: [team-frontend, tier-haiku]
          budget:
            max_tokens: 500000
            max_cost_usd: 10
        models:
          allow: [claude-3-5-haiku-latest]
        policies:
          - type: rate_limit
            rpm: 30
            tpm: 60000

      - name: team-data
        type: ai_provider
        provider: anthropic
        key: ${TEAM_DATA_KEY}
        attrs:
          project: data
          tags: [team-data, tier-sonnet]
          budget:
            max_tokens: 10000000
            max_cost_usd: 250
        models:
          allow:
            - claude-3-5-haiku-latest
            - claude-3-5-sonnet-latest
        policies:
          - type: rate_limit
            rpm: 120
            tpm: 400000
