# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Provider-specific secret references with tenant-scoped backends.
#
# Secret-bearing fields accept provider-specific URI schemes:
#
#   vault://<backend>/<path>[?version=<n>][&key=<json-field>]      # HashiCorp Vault
#   awssm://<backend>/<path>[?version=<n>][&key=<json-field>]      # AWS Secrets Manager
#   gcpsm://<backend>/<path>[?version=<n>][&key=<json-field>]      # GCP Secret Manager
#   k8ssecret://<backend>/<secret>[/<key>]                         # Kubernetes Secrets
#   secretfile://<backend>/<path>[?key=<json-field>]               # local YAML / JSON file
#   secret://<backend>/<name>                                      # local static map
#
# Environment variables keep the existing ${ENV_VAR} form.
#
# Resolution at request time: origin scope -> tenant scope -> proxy
# scope. First scope that declares a backend with the matching scheme
# provider type and backend name serves the reference.
#
# Setup:
#
#   export OPENAI_API_KEY=sk-...
#   export VAULT_TOKEN_SHARED=root-shared-...
#   export VAULT_TOKEN_ACME=acme-token-...
#   export INTERNAL_BEARER_TOKEN=test-bearer-1
#
# Test:
#
#   curl http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: api.acme.example.com' \
#     -H 'Authorization: Bearer test-bearer-1' \
#     -H 'Content-Type: application/json' \
#     -d '{"model":"gpt-4o-mini","messages":[{"role":"user","content":"hi"}]}'

proxy:
  http_bind_port: 8080

  # Proxy-scope vault backends are the fallback for any tenant that
  # does not redeclare the named backend below.
  #
  # NOTE: this block is illustrative until the public config schema
  # exposes vault backend blocks at every scope. It is shown here so
  # the multi-tenant resolution model is clear from a single file.
  #
  # vault:
  #   - name: primary
  #     type: hashicorp
  #     addr: https://vault.shared.example/v1
  #     token: ${VAULT_TOKEN_SHARED}

  # Tenant scope. Each tenant can carry its own vault backends. The
  # acme-corp `primary` block redeclares the proxy default with a
  # tenant-specific endpoint, so references resolved in an acme-corp
  # context hit acme's Vault, not the shared one.
  tenants:
    - id: acme-corp
      # vault:
      #   - name: primary   # same name as proxy default, different instance
      #     type: hashicorp
      #     addr: https://vault.acme.example/v1
      #     token: ${VAULT_TOKEN_ACME}

origins:
  "api.acme.example.com":
    tenant_id: acme-corp
    action:
      type: ai_proxy
      providers:
        - name: openai
          # Runnable path:
          api_key: ${OPENAI_API_KEY}
          # Production alternatives:
          #   api_key: vault://primary/secret/data/openai-prod?key=api_key
          #   api_key: awssm://primary/prod/openai-prod?version=3&key=api_key
          #   api_key: gcpsm://primary/openai-api-key?version=latest
          #   api_key: k8ssecret://primary/sbproxy-secrets/openai-key
          #   api_key: secretfile://local/openai-prod?key=api_key
          default_model: gpt-4o-mini
          models:
            - gpt-4o-mini
            - gpt-4o
      routing: round_robin

    authentication:
      type: bearer
      tokens:
        # Runnable path:
        - ${INTERNAL_BEARER_TOKEN}
        # Production alternatives:
        # - vault://primary/secret/data/inbound/admin-token?key=token
        # - awssm://primary/prod/sbproxy-inbound-tokens?version=3&key=admin
        # - gcpsm://primary/inbound-token?version=latest
        # - k8ssecret://primary/sbproxy-secrets/inbound-token
        # - secretfile://local/inbound-admin?key=current
        # - secret://local/inbound-admin-token
