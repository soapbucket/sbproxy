apiVersion: 1

# Grafana dashboard provider for the reference stack.
#
# This loads every JSON file in /etc/grafana/provisioning/dashboards/ at
# startup. The real Wave 1 dashboards (overview, per-agent, policy
# triggers, audit log, traces overview) ship in task B1.6 and will drop
# into this same directory.

providers:
  - name: sbproxy-reference
    orgId: 1
    folder: SBproxy
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
