# Tempo single-binary config for the SBproxy reference stack.
#
# Storage is local filesystem under /var/tempo. For evaluator and CI use
# only; production deployments should swap in the s3/gcs/azure backend.

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    # Native OTLP receivers. The OTel collector exports here over gRPC.
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  # Flush quickly so traces show up in Grafana within a few seconds; this
  # is wrong for production but right for local evaluation.
  max_block_duration: 5m
  trace_idle_period: 10s
  flush_check_period: 10s

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000

# Lock down the metrics-generator until B1.6 dashboards need it. The
# default is disabled, but documenting that decision here so a later
# wave can switch it on without re-deriving the trade-off.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
