# Reference observability stack for SBproxy.
#
# Operators, evaluators, and the examples-in-CI smoke lane (B1.8 / Q1.11)
# all consume this exact compose file. Image tags are pinned to a specific
# minor release so a `:latest` rebase upstream cannot change CI behavior.
#
# Bring up:    docker compose up -d
# Tear down:   docker compose down -v
# Validate:    docker compose config

services:

  # --- Prometheus: metrics scrape, evaluation, storage ---
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: sbproxy_obs_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=24h"
      - "--web.enable-lifecycle"
      # Required so the OTel collector can push samples via remote_write.
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - obsnet

  # --- Grafana: dashboards + multi-source UI ---
  grafana:
    image: grafana/grafana:11.3.0
    container_name: sbproxy_obs_grafana
    environment:
      # Default admin login is admin / admin. Change for any non-local use.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Suppress the first-run password prompt for evaluator UX.
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - obsnet

  # --- Tempo: distributed traces via OTLP ---
  tempo:
    image: grafana/tempo:2.6.1
    container_name: sbproxy_obs_tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      # Tempo's own OTLP receivers. The OTel collector exports here; the
      # SBproxy binary should normally NOT push to Tempo directly. It pushes
      # to the collector, which is the single OTLP ingress for the stack.
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo HTTP API (used by Grafana datasource)
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - obsnet

  # --- Loki: log aggregation ---
  loki:
    image: grafana/loki:3.2.1
    container_name: sbproxy_obs_loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - obsnet

  # --- OpenTelemetry collector: single OTLP ingress for SBproxy ---
  #
  # We expose host ports 4327/4328 (instead of 4317/4318) to avoid
  # colliding with Tempo's native OTLP receivers, which already claim
  # 4317/4318. Inside the bridge network the collector still talks to
  # Tempo on 4317.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.113.0
    container_name: sbproxy_obs_otel
    command: ["--config=/etc/otel-collector/config.yaml"]
    ports:
      - "4327:4317"   # OTLP gRPC (host -> collector)
      - "4328:4318"   # OTLP HTTP (host -> collector)
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
      loki:
        condition: service_healthy
    networks:
      - obsnet

networks:
  obsnet:
    driver: bridge

# Named volumes survive `docker compose restart`. Use `docker compose
# down -v` to drop them and start clean.
volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
