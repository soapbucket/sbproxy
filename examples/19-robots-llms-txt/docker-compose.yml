# Stack for the `19-robots-llms-txt` example. Single container:
#
#   sbproxy - the gateway, mounts ./sb.yml read-only on :8080.
#             Serves /robots.txt, /llms.txt, and /llms-full.txt off
#             the in-memory projection cache built from the
#             `ai_crawl_control` policy.
#
# Bring up:    docker compose up -d --wait
# Validate:    docker compose config
# Tear down:   docker compose down -v

services:

  sbproxy:
    build:
      context: ../..
      dockerfile: Dockerfile.cloudbuild
    image: sbproxy:19-robots-llms-txt
    container_name: sbproxy_19_robots
    command: ["serve", "-f", "/etc/sbproxy/sb.yml"]
    ports:
      - "8080:8080"
    volumes:
      - ./sb.yml:/etc/sbproxy/sb.yml:ro
    environment:
      - SB_LOG_LEVEL=info
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - robotssb

networks:
  robotssb:
    driver: bridge
