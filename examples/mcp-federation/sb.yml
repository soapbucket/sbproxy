# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# MCP (Model Context Protocol) gateway with federated upstreams.
#
# Aggregates two upstream MCP servers behind one virtual MCP endpoint
# and exposes them at `mcp.example.com`. Each upstream gets a
# namespace prefix, optional RBAC label, and optional per-server
# timeout. A single `tool_allowlist` guardrail restricts which
# (already-prefixed) tools the gateway will forward.
#
# Run:
#   make run CONFIG=examples/mcp-federation/sb.yml
#
# List the federated tool catalogue:
#   curl -s -X POST http://127.0.0.1:8080 \
#     -H 'Host: mcp.example.com' \
#     -H 'Content-Type: application/json' \
#     -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | jq .
#
# Initialize the MCP session (returns the configured server_info):
#   curl -s -X POST http://127.0.0.1:8080 \
#     -H 'Host: mcp.example.com' \
#     -H 'Content-Type: application/json' \
#     -d '{"jsonrpc":"2.0","id":1,"method":"initialize"}' | jq .
#
# Call a federated tool (routed to the upstream owning the namespace):
#   curl -s -X POST http://127.0.0.1:8080 \
#     -H 'Host: mcp.example.com' \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "jsonrpc":"2.0",
#       "id":2,
#       "method":"tools/call",
#       "params":{
#         "name":"gh.search_repos",
#         "arguments":{"q":"sbproxy"}
#       }
#     }' | jq .
#
# A `tools/call` for a tool not in the allowlist returns a JSON-RPC
# error with code -32602 (`invalid params`) and a message naming the
# blocked tool.

proxy:
  http_bind_port: 8080

# Emit the canonical session ledger (one record per `tools/call`) so
# behavioral eval can assert what the agent did at the tool boundary.
# `logging` writes each record as a structured `session_ledger` tracing
# line; switch to `sink: file` + `path:` for an NDJSON artifact. See
# docs/mcp.md "Session ledger".
session_ledger:
  enabled: true
  sink: logging

origins:
  "mcp.example.com":
    action:
      type: mcp
      mode: gateway
      server_info:
        name: my-mcp
        version: "1.0.0"
      # Named RBAC policies referenced by each upstream's `rbac:`
      # label. Default-deny: a caller matching no rule is refused, so
      # a tool is reachable only when a rule allows it. The `read_only`
      # policy allows one tool; a `tools/call` for anything else on the
      # gh upstream comes back as a JSON-RPC error and the upstream is
      # never contacted.
      rbac_policies:
        read_only:
          default_allow: false
          tool_access:
            - principals: []
              allowed: ["gh.search_repos"]
        db_writer:
          default_allow: false
          tool_access:
            - principals: []
              allowed: ["db.query"]
      federated_servers:
        # Bare hostnames are normalised to https://<host>/mcp.
        # Use a full https://... URL for any other path. Per-server
        # `rbac:` (a label above) and `timeout:` (Go duration) are
        # enforced: RBAC gates every tools/call against the caller's
        # principal, and a call that outlasts the timeout fails rather
        # than hanging the request.
        - origin: github.example.com
          prefix: gh
          rbac: read_only
          timeout: 10s
        - origin: postgres.example.com
          prefix: db
          rbac: db_writer
          timeout: 5s
      guardrails:
        # The allowlist is a second, coarser gate on top of RBAC: even
        # an RBAC-allowed tool must also appear here to be forwarded.
        - type: tool_allowlist
          allow:
            - gh.search_repos
            - db.query
