# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Semantic cache backed by an OpenAI-compatible embedding endpoint.
#
# The AI gateway's semantic cache serves near-duplicate prompts from cache:
# it embeds each prompt and, on a cache hit (cosine similarity above the
# threshold), replays the stored completion instead of calling the provider.
# A hit is sub-millisecond, costs nothing, and is marked with the response
# header `x-semcache: HIT`.
#
# This example vectorizes prompts via any OpenAI-compatible /v1/embeddings
# endpoint (`source: openai`). It defaults to OpenAI itself so it runs with
# just OPENAI_API_KEY; point `base_url` at another sbproxy, OpenRouter, or
# any hosted embedder to decouple it from this origin's chat provider. For an
# on-box embedder with no egress, see examples/semantic-cache-local.
#
# Setup:
#   export OPENAI_API_KEY=sk-...
#   make run CONFIG=examples/semantic-cache-openai/sb.yml
#
# Test (run the second, reworded prompt to see x-semcache: HIT):
#   curl -s -D - -o /dev/null http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' -H 'Content-Type: application/json' \
#     -d '{"model":"gpt-4o-mini","messages":[{"role":"user","content":"What are the benefits of caching?"}]}' \
#     -w 'roundtrip=%{time_total}s\n' | grep -iE 'x-semcache|roundtrip'
#
#   curl -s -D - -o /dev/null http://127.0.0.1:8080/v1/chat/completions \
#     -H 'Host: ai.local' -H 'Content-Type: application/json' \
#     -d '{"model":"gpt-4o-mini","messages":[{"role":"user","content":"Summarize the benefits of caching."}]}' \
#     -w 'roundtrip=%{time_total}s\n' | grep -iE 'x-semcache|roundtrip'

proxy:
  http_bind_port: 8080

origins:
  "ai.local":
    action:
      type: ai_proxy
      routing: round_robin
      providers:
        - name: openai
          api_key: ${OPENAI_API_KEY}
          default_model: gpt-4o-mini
          models:
            - gpt-4o-mini

      # Embedding semantic cache, vectorized via an OpenAI-compatible
      # /v1/embeddings endpoint (here, OpenAI itself).
      semantic_cache:
        enabled: true
        threshold: 0.85        # cosine similarity for a near-duplicate hit
        ttl_secs: 3600
        max_entries: 1024
        source: openai
        openai:
          base_url: https://api.openai.com/v1
          api_key: ${OPENAI_API_KEY}
          model: text-embedding-3-small
          timeout_ms: 5000
          # Pointing elsewhere? Auth defaults to Authorization: Bearer ${api_key}.
          # For api-key / x-api-key style endpoints set auth_header / auth_prefix,
          # and pass any extra headers (e.g. OpenRouter ranking headers) via headers.
