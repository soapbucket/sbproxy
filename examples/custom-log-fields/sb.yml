# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Operator-defined custom access-log fields.
#
# `observability.log.custom_fields:` adds keys to each access line's
# `custom` object, computed per request. Each field is either a static
# value with `${...}` variable interpolation, or a script (CEL / Lua /
# JS) evaluated against the request context. This lets you pivot logs on
# dimensions the built-in schema does not carry (region, deployment, a
# derived tier, a routing decision) without forking the binary.
#
# Run:
#   REGION=us-east-1 make run CONFIG=examples/custom-log-fields/sb.yml
#
# Test (in another terminal):
#   curl -s -H 'Host: api.local' -H 'X-Tier: gold' http://127.0.0.1:8080/anything | head -c 40
#
# Expected (the access line on the proxy's stdout carries a `custom`
# object alongside the standard fields):
#   {"timestamp":"...","origin":"api.local","method":"GET","path":"/anything","status":200,...,"custom":{"region":"us-east-1","caller_tier":"gold","route_class":"read","upper_method":"GET"}}

proxy:
  http_bind_port: 8080

  observability:
    log:
      custom_fields:
        # 1. Static value with variable interpolation. Variables include
        #    ${env.NAME}, ${tenant_id}, ${method}, ${path}, ${host},
        #    ${status}, ${provider}, ${model},
        #    ${request.header.NAME}, and ${attribution.KEY}.
        - name: region
          value: "${env.REGION}"

        # 2. CEL expression over the request context. Reads an inbound
        #    header and falls back to a literal.
        - name: caller_tier
          engine: cel
          source: 'has(request.headers["x-tier"]) ? request.headers["x-tier"] : "standard"'

        # 3. Lua script. The whole request context is the `ctx` global;
        #    the script returns the value to log.
        - name: route_class
          engine: lua
          source: |
            if string.find(ctx.request.method, "GET") then
              return "read"
            else
              return "write"
            end

        # 4. JS script. Same `ctx` global; returns a string.
        - name: upper_method
          engine: js
          source: "ctx.request.method.toUpperCase()"

# A plain access log so the lines (with their `custom` object) print to
# stdout.
access_log:
  enabled: true

origins:
  "api.local":
    action:
      type: proxy
      url: https://test.sbproxy.dev
