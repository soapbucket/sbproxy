# 31 - rail-mpp-stripe-test
#
# Stripe MPP (Merchant Payment Protocol, preview `2026-03-04`) paywall
# in front of a markdown feed origin. The example uses Stripe in test
# mode; the operator brings their own `STRIPE_SECRET_KEY=sk_test_...`
# (see README for setup). When the env var is absent, the smoke
# runner skips this example and the proxy still emits the 402
# challenge body shape with a placeholder `pi_pending_*`
# `payment_intent` id.
#
# Bundle layout:
#   sb.yml                 - this file
#   docker-compose.yml     - sbproxy + mock-origin (+ optional wiremock)
#   mock-origin/           - nginx serving a markdown feed entry
#   wiremock-stripe/       - offline Stripe stand-in (opt-in)
#   Makefile               - up / down / logs / test wrappers
#   smoke.json             - examples-smoke.sh probe schema
#
# Run (with a real Stripe test key):
#   export STRIPE_SECRET_KEY=sk_test_...
#   export STRIPE_WEBHOOK_SECRET=whsec_...
#   docker compose up -d --wait
#
# Run (offline, wiremock):
#   docker compose --profile wiremock up -d --wait
#   # The proxy is configured to talk to wiremock on the same network
#   # via STRIPE_API_BASE; see README for the override.

proxy:
  http_bind_port: 8080

origins:
  "feed.test.sbproxy.dev":
    # Markdown feed origin. The proxy charges per fetch via the MPP
    # rail; cooperative crawlers see the price up front and confirm
    # the PaymentIntent before the request flows through.
    action:
      type: proxy
      url: http://mock-origin:80

    policies:
      - type: ai_crawl_control
        # Default fallback price. Tier-matched routes override this in
        # the multi-rail challenge body. MPP charges in the same micro
        # currency units as x402 so prices are directly comparable.
        price: 0.005
        currency: USD
        header: crawler-payment

        crawler_user_agents:
          - GPTBot
          - ChatGPT-User
          - ClaudeBot
          - anthropic-ai
          - CCBot
          - PerplexityBot
          - Google-Extended

        # Single tier: $0.005 USD on the markdown feed. The shape
        # selector ensures only Markdown-shaped requests match (see
        # docs/billing-rails.md for how Accept negotiation interacts
        # with tier resolution).
        tiers:
          - route_pattern: /feed/*
            price:
              amount_micros: 5000
              currency: USD
            content_shape: markdown
            paywall_position: top_of_page

        # Wave 3 multi-rail block. MPP-only here; combine with x402
        # in `examples/32-multi-rail-accept-payment/`. The MPP rail
        # config is intentionally small in Wave 3: the `version` pin
        # is the only operator-tunable knob. The Stripe `pi_*`
        # identifier is generated by the proxy at 402-emission time
        # as a placeholder (`pi_pending_<quote_id>`); the worker
        # (G3.3) replaces it with the real PI on the redeem path.
        rails:
          mpp:
            version: "1"

        quote_token:
          key_id: mpp-stripe-test-2026
          # Demo seed only. Production deployments source from an env
          # var via `secret_ref:`.
          seed_hex: "2222222222222222222222222222222222222222222222222222222222222222"
          issuer: "https://feed.test.sbproxy.dev"
          default_ttl_seconds: 300
