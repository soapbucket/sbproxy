# yaml-language-server: $schema=../../schemas/sb-config.schema.json

proxy:
  http_bind_port: 18083
  admin:
    enabled: true
    bind: 127.0.0.1
    port: 19093
    username: admin
    password: ${SB_ADMIN_PASSWORD:-change-this-before-running}
  cluster:
    cluster_id: model-cluster-split
    node_id: worker-b
    roles: [worker]
    labels: {zone: local-b}
    seeds: [127.0.0.1:17946]
    gossip_port: 17949
    transport_port: 18949
    advertise_addr: 127.0.0.1:17949
    transport_advertise_addr: 127.0.0.1:18949
    model_bind: 127.0.0.1:19444
    model_endpoint: https://127.0.0.1:19444
    state_dir: ./state/worker-b
    security:
      mode: mtls
      shared_key: file:./state/worker-b/gossip.key
      cert_file: ./state/worker-b/node.pem
      key_file: ./state/worker-b/node-key.pem
      ca_file: ./state/worker-b/ca.pem
      server_name: sbproxy-mesh
    snapshot_ttl_secs: 10
    publish_interval_secs: 2
    dead_peer_gc_secs: 300
  model_host:
    authority: file_managed
    handoff_timeout_ms: 15000
    cache:
      directory: ./state/worker-b/models
      budget_gib: 4
      max_resident_models: 1
    engines:
      llama_cpp:
        launch: binary
        version: b9905
        acceleration: auto
    deployments:
      local-qwen:
        model: qwen2.5-0.5b-instruct
        variant: q4_k_m
        replicas: 2
        spread_by: [zone]
        pull: on_boot
        warm: true
        engine: llama_cpp
        rollout: rolling

origins:
  "worker-b.local":
    action: {type: static, status_code: 200, body: worker-b}
