# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Authority process for the split-role local mTLS example.

proxy:
  http_bind_port: 18080
  admin:
    enabled: true
    bind: 127.0.0.1
    port: 19090
    username: admin
    password: ${SB_ADMIN_PASSWORD:-change-this-before-running}
  cluster:
    cluster_id: model-cluster-split
    node_id: authority-a
    roles: [authority]
    labels: {zone: control}
    seeds: []
    gossip_port: 17946
    transport_port: 18946
    advertise_addr: 127.0.0.1:17946
    transport_advertise_addr: 127.0.0.1:18946
    state_dir: ./state/authority
    security:
      mode: mtls
      shared_key: file:./state/authority/gossip.key
      cert_file: ./state/authority/node.pem
      key_file: ./state/authority/node-key.pem
      ca_file: ./state/authority/ca.pem
      server_name: sbproxy-mesh
    snapshot_ttl_secs: 10
    publish_interval_secs: 2
  model_host:
    authority: file_managed
    handoff_timeout_ms: 15000
    cache:
      directory: ./state/authority/models
      budget_gib: 4
      max_resident_models: 1
    engines:
      llama_cpp:
        launch: binary
        version: b9905
        acceleration: auto
    deployments:
      local-qwen:
        model: qwen2.5-0.5b-instruct
        variant: q4_k_m
        replicas: 2
        spread_by: [zone]
        pull: on_boot
        warm: true
        engine: llama_cpp
        rollout: rolling

origins:
  "authority.local":
    action: {type: static, status_code: 200, body: authority}
