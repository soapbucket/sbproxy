# Stand-in origin for the 32-multi-rail-accept-payment example.
# Serves a single article on `/article` so the proxy has something to
# forward once a paid request flows through. Articles for this example
# are HTML-shaped, matching the policy's tier `content_shape`.

server {
    listen 80;
    server_name _;

    location = /article {
        default_type text/html;
        return 200 '<!doctype html>\n<html><head><title>multi-rail demo</title></head><body>\n<h1>Multi-rail Article</h1>\n<p>This page is gated behind a multi-rail (x402 + MPP) payment challenge. The agent picks the rail via the Accept-Payment header.</p>\n</body></html>\n';
    }

    location = /__health {
        default_type text/plain;
        return 200 'ok\n';
    }
}
