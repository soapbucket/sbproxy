# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Rate limiting policy.
#
# Caps each client IP at 5 requests per second with a small burst. Excess
# requests get a 429 with a Retry-After header. Backed by a token bucket.
# Upstream is test.sbproxy.dev, a free public HTTP testing service.
#
# Run:
#   make run CONFIG=examples/rate-limiting/sb.yml
#
# Test (fire 30 requests at once; the burst of 10 passes, the rest get 429):
#   seq 1 30 | xargs -P 30 -I{} curl -s -o /dev/null -w '%{http_code}\n' \
#     -H 'Host: api.local' http://127.0.0.1:8080/get | sort | uniq -c
#   # => roughly:  10 200
#   #              20 429
#
#   # A sequential loop will not trip the limit: network latency keeps it
#   # under 5 rps and the bucket refills between requests. Burst concurrently.

proxy:
  http_bind_port: 8080

origins:
  "api.local":
    action:
      type: proxy
      url: https://test.sbproxy.dev

    policies:
      - type: rate_limiting
        requests_per_second: 5
        burst: 10
        key: ip
