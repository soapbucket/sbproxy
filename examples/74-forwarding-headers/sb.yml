# Per-action opt-outs for the standard forwarding headers.
#
# By default the proxy sets these on every upstream request:
#   * X-Forwarded-Host    - client's original Host (when proxy rewrites Host)
#   * X-Forwarded-For     - appended client IP (preserves chain)
#   * X-Real-IP           - the immediate client IP
#   * X-Forwarded-Proto   - http or https
#   * X-Forwarded-Port    - listener port
#   * Forwarded           - RFC 7239, with IPv6 bracketed
#   * Via                 - 1.1 sbproxy
#
# Each header has its own `disable_*_header` opt-out flag on the
# action. Use these when an upstream rejects the metadata or when you
# do not want to leak the public-facing scheme/port to a backend.
#
# Run:
#   make run CONFIG=examples/74-forwarding-headers/sb.yml
#
# Test:
#   curl -H 'Host: localhost' http://127.0.0.1:8080/headers
#   # Upstream will not see Via or X-Forwarded-Port; everything else
#   # is set normally.

proxy:
  http_bind_port: 8080

origins:
  "localhost":
    action:
      type: proxy
      url: https://httpbin.org
      disable_via_header: true
      disable_forwarded_port_header: true
