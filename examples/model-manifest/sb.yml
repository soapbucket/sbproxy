# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Model host driven by a manifest.
#
# The provider's serve.catalog_file points at models.yaml (the fleet
# fact sheet). sb.yml stays the box fact sheet: what this box serves and
# where its cache lives. See models.yaml for exact sources, revisions,
# files, digests, requirements, engines, and pull policy.
#
# Run:
#   make run CONFIG=examples/model-manifest/sb.yml
proxy:
  http_bind_port: 8080

origins:
  "ai.local":
    action:
      type: ai_proxy
      providers:
        - name: local
          # No base_url: a served provider is hosted on this box, so the
          # gateway resolves the engine's loopback port itself. Pairing
          # base_url with serve: is rejected fatally at gateway boot.
          default_model: qwen2.5-0.5b-instruct
          models:
            - qwen2.5-0.5b-instruct
            - offline-coder
          serve:
            # The manifest: which models exist and how to fetch them.
            catalog_file: models.yaml
            # Where this box caches weights. Defaults to
            # /var/lib/sbproxy/models for a service; overridable here.
            cache_dir: /var/lib/sbproxy/models
            eviction: lru
            models:
              # Each names a manifest id; engine and pull come from the
              # manifest entry unless overridden here.
              - model: qwen2.5-0.5b-instruct
                variant: q4_k_m
              - model: offline-coder
                variant: q4_k_m
