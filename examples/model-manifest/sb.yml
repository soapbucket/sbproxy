# yaml-language-server: $schema=../../schemas/sb-config.schema.json
# Model host driven by a manifest (WOR-1681).
#
# The provider's serve.catalog_file points at models.yaml (the fleet
# fact sheet). sb.yml stays the box fact sheet: what this box serves and
# where its cache lives. See models.yaml for the per-model source,
# revision pin, digests, token, engine, and pull policy.
#
# Run:
#   make run CONFIG=examples/model-manifest/sb.yml
proxy:
  http_bind_port: 8080

origins:
  "ai.local":
    action:
      type: ai_proxy
      providers:
        - name: local
          base_url: http://127.0.0.1:8000/v1
          allow_private_base_url: true
          default_model: qwen3-14b
          models:
            - qwen3-14b
            - llama-3.1-8b
            - offline-coder
          serve:
            # The manifest: which models exist and how to fetch them.
            catalog_file: examples/model-manifest/models.yaml
            # Where this box caches weights. Defaults to
            # /var/lib/sbproxy/models for a service; overridable here.
            cache_dir: /var/lib/sbproxy/models
            cache_budget_gib: 400
            eviction: lru
            models:
              # Each names a manifest id; engine and pull come from the
              # manifest entry unless overridden here.
              - model: qwen3-14b
              - model: llama-3.1-8b
              - model: offline-coder
