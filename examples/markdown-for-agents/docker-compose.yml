# Stack for the `markdown-for-agents` example. Single container:
#
#   sbproxy - the gateway, mounts ./sb.yml read-only on :8080
#
# The `static` action serves the article body in-process so this
# bundle has no upstream dependency. Compare with the
# `ai-crawl-tiered` example, which fronts a separate `mock-origin`
# to demonstrate the proxy mode.
#
# Bring up:    docker compose up -d
# Validate:    docker compose config
# Tear down:   docker compose down -v
#
# The image is distroless (no shell, no wget), so there is no
# container healthcheck. `make up` waits for the listener with curl
# from the host instead.

services:

  # --- sbproxy data plane ---
  #
  # Builds the proxy from the workspace source. Cloud Build's variant
  # (`Dockerfile.cloudbuild`) is the reference Dockerfile; it builds a
  # release binary and wraps it in distroless/cc-debian12. Operators
  # who want to pin a specific release can swap `build:` for
  # `image: ghcr.io/soapbucket/sbproxy:<tag>` once a public image tag
  # is available.
  sbproxy:
    build:
      context: ../..
      dockerfile: Dockerfile.cloudbuild
    image: sbproxy:17-markdown-for-agents
    container_name: sbproxy_17_md
    command: ["serve", "-f", "/etc/sbproxy/sb.yml"]
    ports:
      - "8080:8080"
    volumes:
      - ./sb.yml:/etc/sbproxy/sb.yml:ro
    environment:
      - SB_LOG_LEVEL=info
    networks:
      - mdsb

networks:
  mdsb:
    driver: bridge
