# SBproxy SLO recording rules (Wave 1, B1.7)
#
# Pre-computes the SLI series for the SLO catalog in docs/observability.md so
# that burn-rate alerts (alerting-rules.yml) evaluate against compact,
# pre-aggregated time series. Naming follows the catalog:
# sbproxy:slo:<pillar>:<sli>:<window>.
#
# Every metric name and label matcher below is checked against the executable
# metric registry by crates/sbproxy-observe/tests/metric_drift.rs. A rule that
# selects on a label the metric does not carry fails the build, because that is
# not a rule that returns nothing: in PromQL an absent label is the empty
# string, so `{absent!="x"}` silently matches every series and `{absent="x"}`
# silently matches none. Both read as a healthy system.
#
# Wave 1 ships the substrate SLOs (availability, latency, ledger, audit).
# Per-rail / per-tenant / per-classifier-drift rules land with their respective
# pillars in later waves.

groups:
  # --- Substrate availability ---
  - name: sbproxy_slo_substrate_availability
    interval: 30s
    rules:
      # Rolling success ratio over various windows. Burn-rate alerts use
      # the short and long windows from the SRE workbook.
      #
      # `status` is the raw HTTP code, so a 5xx is `status=~"5.."`. This
      # previously read `status_class!="5xx"`, and no such label has ever
      # existed on sbproxy_requests_total. The matcher therefore selected
      # every series, the numerator equalled the denominator, and every
      # window below recorded exactly 1.0 no matter what the proxy was
      # doing. All three availability alerts, two of them page-tier, were
      # structurally incapable of firing.
      - record: sbproxy:slo:substrate:availability:5m
        expr: |
          sum(rate(sbproxy_requests_total{status!~"5.."}[5m]))
          /
          sum(rate(sbproxy_requests_total[5m]))

      - record: sbproxy:slo:substrate:availability:30m
        expr: |
          sum(rate(sbproxy_requests_total{status!~"5.."}[30m]))
          /
          sum(rate(sbproxy_requests_total[30m]))

      - record: sbproxy:slo:substrate:availability:1h
        expr: |
          sum(rate(sbproxy_requests_total{status!~"5.."}[1h]))
          /
          sum(rate(sbproxy_requests_total[1h]))

      - record: sbproxy:slo:substrate:availability:6h
        expr: |
          sum(rate(sbproxy_requests_total{status!~"5.."}[6h]))
          /
          sum(rate(sbproxy_requests_total[6h]))

      - record: sbproxy:slo:substrate:availability:24h
        expr: |
          sum(rate(sbproxy_requests_total{status!~"5.."}[24h]))
          /
          sum(rate(sbproxy_requests_total[24h]))

      - record: sbproxy:slo:substrate:availability:30d
        expr: |
          sum(rate(sbproxy_requests_total{status!~"5.."}[30d]))
          /
          sum(rate(sbproxy_requests_total[30d]))

      # Error budget remaining for the 30d SLO (target 99.9%).
      - record: sbproxy:slo:substrate:availability:budget_remaining:30d
        expr: |
          (sbproxy:slo:substrate:availability:30d - 0.999) / (1 - 0.999)

  # --- Substrate latency ---
  - name: sbproxy_slo_substrate_latency
    interval: 30s
    rules:
      - record: sbproxy:slo:substrate:latency_p95:5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(sbproxy_request_duration_seconds_bucket[5m]))
          )

      - record: sbproxy:slo:substrate:latency_p99:5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(sbproxy_request_duration_seconds_bucket[5m]))
          )

      - record: sbproxy:slo:substrate:latency_p99:1h
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(sbproxy_request_duration_seconds_bucket[1h]))
          )

  # --- Ledger redeem ---
  #
  # There is no sbproxy_ledger_redeem_total counter and there never has been.
  # The code records a histogram, so the request count is its derived `_count`
  # series, and the outcome label is `outcome`, not `result`. Both rule sets
  # asked for a metric that does not exist, which returns no data, which
  # renders as a blank panel and an alert that cannot fire.
  - name: sbproxy_slo_ledger
    interval: 30s
    rules:
      - record: sbproxy:slo:ledger:redeem_success:5m
        expr: |
          sum(rate(sbproxy_ledger_redeem_duration_seconds_count{outcome="success"}[5m]))
          /
          sum(rate(sbproxy_ledger_redeem_duration_seconds_count[5m]))

      - record: sbproxy:slo:ledger:redeem_success:1h
        expr: |
          sum(rate(sbproxy_ledger_redeem_duration_seconds_count{outcome="success"}[1h]))
          /
          sum(rate(sbproxy_ledger_redeem_duration_seconds_count[1h]))

      - record: sbproxy:slo:ledger:redeem_success:6h
        expr: |
          sum(rate(sbproxy_ledger_redeem_duration_seconds_count{outcome="success"}[6h]))
          /
          sum(rate(sbproxy_ledger_redeem_duration_seconds_count[6h]))

      - record: sbproxy:slo:ledger:redeem_success:30d
        expr: |
          sum(rate(sbproxy_ledger_redeem_duration_seconds_count{outcome="success"}[30d]))
          /
          sum(rate(sbproxy_ledger_redeem_duration_seconds_count[30d]))

      - record: sbproxy:slo:ledger:redeem_latency_p99:5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(sbproxy_ledger_redeem_duration_seconds_bucket[5m]))
          )

  # --- Audit-log emit ---
  #
  # Same shape as the ledger group: the counter does not exist, and the audit
  # emitter's success label value is `ok`, not `success`.
  - name: sbproxy_slo_audit
    interval: 30s
    rules:
      - record: sbproxy:slo:audit:write_success:5m
        expr: |
          sum(rate(sbproxy_audit_emit_duration_seconds_count{outcome="ok"}[5m]))
          /
          sum(rate(sbproxy_audit_emit_duration_seconds_count[5m]))

      - record: sbproxy:slo:audit:write_success:1h
        expr: |
          sum(rate(sbproxy_audit_emit_duration_seconds_count{outcome="ok"}[1h]))
          /
          sum(rate(sbproxy_audit_emit_duration_seconds_count[1h]))

      - record: sbproxy:slo:audit:write_success:24h
        expr: |
          sum(rate(sbproxy_audit_emit_duration_seconds_count{outcome="ok"}[24h]))
          /
          sum(rate(sbproxy_audit_emit_duration_seconds_count[24h]))

      - record: sbproxy:slo:audit:emit_latency_p99:5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(sbproxy_audit_emit_duration_seconds_bucket[5m]))
          )

      - record: sbproxy:slo:audit:emit_latency_p99:1h
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(sbproxy_audit_emit_duration_seconds_bucket[1h]))
          )

  # --- Outbound + cardinality (informational) ---
  - name: sbproxy_slo_outbound
    interval: 30s
    rules:
      # Outbound success is derived from the histogram's `_count` series, and
      # grouped by `host`: there is no `target` label, and no
      # sbproxy_outbound_request_total counter.
      - record: sbproxy:slo:outbound:success:5m
        expr: |
          sum by (host) (rate(sbproxy_outbound_request_duration_seconds_count{status=~"2.."}[5m]))
          /
          sum by (host) (rate(sbproxy_outbound_request_duration_seconds_count[5m]))

      # Cardinality budget headroom. Used by the log-only CARD-BUDGET alert.
      #
      # Grouped by the labels the metrics actually carry. This previously
      # grouped sbproxy_requests_total by (route, status_class, agent_class,
      # rail, tenant_id), of which only agent_class exists, so it collapsed to
      # a single dimension and under-reported cardinality by orders of
      # magnitude. The alert it feeds has a threshold of 45,000 and could
      # never approach it.
      - record: sbproxy:cardinality:requests_total
        expr: |
          count(count by (hostname, method, status, agent_id, agent_class, agent_vendor, payment_rail, content_shape) (sbproxy_requests_total))

      - record: sbproxy:cardinality:policy_triggers_total
        expr: |
          count(count by (origin, policy_type, action, agent_id, agent_class) (sbproxy_policy_triggers_total))
