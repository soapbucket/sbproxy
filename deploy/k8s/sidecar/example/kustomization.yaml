apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Worked sidecar example. Apply with:
#   kubectl apply -k deploy/k8s/sidecar/example/
#
# Deploys a representative agentic client pod with the sbproxy
# sidecar injected, plus the PodMonitor for the per-pod metrics
# scrape.

resources:
  - ../base
  - agent-pod.yaml
  - podmonitor.yaml

namespace: sbproxy-sidecar-demo

namePrefix: demo-
