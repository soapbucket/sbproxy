[SERVICE]
    # Fluent Bit service configuration
    Flush         5
    Daemon        off
    Log_Level     info
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    # Load custom parsers
    Parsers_File  /fluent-bit/etc/parsers.conf
    # Store position to avoid re-reading logs on restart
    storage.path  /var/lib/fluent-bit/storage
    storage.sync  normal
    storage.checksum  off
    storage.backlog.mem_limit  50M

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Tag               docker.*
    Parser            docker_no_time
    Refresh_Interval  5
    Rotate_Wait       5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    # Store position to avoid re-reading on restart
    DB                /var/lib/fluent-bit/storage/docker-logs.db
    DB.locking        true

# Parse the 'log' field as JSON to extract proxy application logs
[FILTER]
    Name                parser
    Match               docker.*
    Key_Name            log
    Parser              proxy_json
    Reserve_Data        On
    Preserve_Key        Off

[FILTER]
    Name                modify
    Match               docker.*
    # Add metadata
    Add                 log_source fluent-bit
    Add                 shipper fluent-bit

# NOTE: Request logs are sent directly to ClickHouse from the proxy application
# using a custom slog handler with HTTP batching (best practice for Go → ClickHouse).
# Fluent Bit is used only for application and security logs → Elasticsearch.

# Route all logs to Elasticsearch for application and security logs
[OUTPUT]
    Name                es
    Match               docker.*
    Host                elasticsearch
    Port                9200
    Index               proxy-logs
    Type                _doc
    Generate_ID         On
    # Retry configuration
    Retry_Limit         5
    Suppress_Type_Name  On

