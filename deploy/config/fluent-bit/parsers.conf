[PARSER]
    Name        docker_no_time
    Format      json
    Time_Keep   Off

[PARSER]
    Name        proxy_json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On
    # Decode the escaped JSON in the 'log' field AFTER initial parse
    Decode_Field_As   escaped_utf8   log

