# By default Redis does not run as a daemon. Use 'yes' if you need it.
# Note that Redis will write a pid file in /var/run/redis.pid when daemonized.
daemonize no

# When run as a daemon, Redis write a pid file in /var/run/redis.pid by default.
# You can specify a custom pid file location here.
# pidfile /var/run/redis.pid

# Accept connections on the specified port.
port 6379

# By default, Redis listens for connections from all available network interfaces.
# To only listen on specific interfaces, bind to their IP addresses.
# bind 127.0.0.1

# Protect Redis from unauthenticated clients.
# requirepass your_strong_password

# The working directory for Redis.
# This is where RDB and AOF files will be saved.
dir ./

# The name of the dump file.
dbfilename dump.rdb

# Save the DB on disk:
#   save <seconds> <changes>
#   Will save the DB if both the given number of seconds and the given
#   number of write operations against the DB occurred.
#   In the example below the DB will be saved on disk if:
#   - 3600 seconds (1 hour) have elapsed and at least 1 change was performed.
#   - 300 seconds (5 minutes) have elapsed and at least 100 changes were performed.
#   - 60 seconds (1 minute) have elapsed and at least 10000 changes were performed.
#   You can disable saving completely by commenting out all "save" lines.
save 900 1
save 300 10
save 60 10000

# Specify the maximum number of clients that can be connected at the same time.
# maxclients 10000

# Don't use more memory than the specified amount of bytes.
# When the memory limit is reached Redis will try to remove keys
# accordingly to the eviction policy selected (see maxmemory-policy).
# maxmemory <bytes>
# maxmemory-policy noeviction