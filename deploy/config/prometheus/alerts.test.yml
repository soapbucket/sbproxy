# Prometheus alerting rules for proxy testing

groups:
  - name: proxy_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is above 1 second"

      - alert: ProxyDown
        expr: up{job="proxy"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Proxy is down"
          description: "Proxy metrics endpoint is not responding"

