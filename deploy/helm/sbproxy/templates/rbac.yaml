apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: sbproxy
    app.kubernetes.io/component: operator
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # Watch + manage our own CRDs.
  - apiGroups: ["sbproxy.dev"]
    resources: ["sbproxies", "sbproxyconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sbproxy.dev"]
    resources: ["sbproxies/status"]
    verbs: ["get", "update", "patch"]
  # Manage the Deployment / Service / ConfigMap children we own.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Emit events so kubectl describe surfaces reconcile diagnostics.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election. The operator races for a coordination.k8s.io/v1 Lease
  # named `sbproxy-operator-leader` in its own namespace. Only the lock holder
  # reconciles; standbys wait. See docs/kubernetes.md "Leader election".
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: sbproxy
    app.kubernetes.io/component: operator
    app.kubernetes.io/managed-by: {{ .Release.Service }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.serviceAccount.name }}
