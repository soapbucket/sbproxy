{{- if .Values.installCrds -}}
# CRDs for the sbproxy OSS operator.
#
# Generated from `crates/sbproxy-k8s-operator/src/crd.rs` via:
#   cargo run -p sbproxy-k8s-operator -- print-crds > deploy/crds/sbproxy.yaml
# Refresh that file (and copy it back here) whenever the CRD types change.
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sbproxies.sbproxy.dev
  labels:
    app.kubernetes.io/name: sbproxy
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  group: sbproxy.dev
  names:
    kind: SBProxy
    plural: sbproxies
    shortNames:
      - sbp
    singular: sbproxy
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: A desired sbproxy deployment.
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - configRef
                - image
              properties:
                configRef:
                  type: string
                  description: Name of an SBProxyConfig in the same namespace.
                image:
                  type: string
                  description: Container image (with tag) for the proxy pod.
                port:
                  type: integer
                  format: int32
                  default: 8080
                replicas:
                  type: integer
                  format: int32
                  default: 1
                resources:
                  type: object
                  nullable: true
                  properties:
                    requests:
                      type: object
                      additionalProperties:
                        type: string
                    limits:
                      type: object
                      additionalProperties:
                        type: string
                adminPort:
                  type: integer
                  format: int32
                  default: 9090
                  description: Admin server port for /admin/reload. Used by the operator to drive hot-reload over the cluster network.
                adminAuthSecretRef:
                  type: object
                  nullable: true
                  description: |
                    Reference to a Kubernetes Secret in the same namespace whose value is
                    the basic-auth header for /admin/reload. When set, the operator
                    prefers a hot-reload over a rollout-restart on config changes.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Secret name in the same namespace as the SBProxy.
                    key:
                      type: string
                      default: authorization
                      description: Key inside the Secret whose value is the full basic-auth header (e.g. `Basic YWRtaW46c2VjcmV0`).
                clustering:
                  description: |-
                    Optional mesh clustering for multi-replica deployments.

                    When present and `enabled: true`, the operator reconciles a StatefulSet (stable per-pod identity) plus a headless Service for gossip instead of a Deployment, generates a shared cluster key Secret when none is referenced, and injects a rendered `proxy.cluster` block into the mounted `sb.yml` so the replicas form a mesh without hand-written peer configuration. Absent or `enabled: false` keeps the plain-Deployment path unchanged.
                  nullable: true
                  properties:
                    clusterDomain:
                      default: cluster.local
                      description: Cluster DNS domain used when rendering the stable per-pod seed addresses (`<pod>.<headless-svc>.<ns>.svc.<domain>`). Defaults to `cluster.local`; override only on clusters with a custom domain.
                      type: string
                    clusterSecretRef:
                      description: Optional name of an existing Secret in the same namespace whose `cluster-key` entry holds the shared cluster key. When unset the operator generates a `<sbproxy-name>-cluster-key` Secret once and reuses it for the lifetime of the SBProxy, so rescheduled pods always rejoin with the same key.
                      nullable: true
                      type: string
                    enabled:
                      default: false
                      description: Turn mesh clustering on. Defaults to false.
                      type: boolean
                    gossipPort:
                      default: 7946
                      description: UDP gossip listener port carried into `proxy.cluster.gossip_port` and exposed on the headless Service. Defaults to 7946.
                      format: int32
                      type: integer
                    transportPort:
                      default: 8946
                      description: TCP typed-state transport port carried into `proxy.cluster.transport_port` and exposed on the headless Service. Defaults to 8946.
                      format: int32
                      type: integer
                  type: object
            status:
              type: object
              nullable: true
              properties:
                configHash:
                  type: string
                lastError:
                  type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sbproxyconfigs.sbproxy.dev
  labels:
    app.kubernetes.io/name: sbproxy
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  group: sbproxy.dev
  names:
    kind: SBProxyConfig
    plural: sbproxyconfigs
    shortNames:
      - sbpc
    singular: sbproxyconfig
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: A versioned sb.yml document mounted by an SBProxy.
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - config
              properties:
                config:
                  type: string
                  description: The full sb.yml document as a YAML string.
{{- end }}
