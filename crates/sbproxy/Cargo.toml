[package]
name = "sbproxy"
version.workspace = true
edition = "2021"
license.workspace = true
publish = false

[[bin]]
name = "sbproxy"
path = "src/main.rs"

# --- AI Governance feature flags ---
#
# The `sbproxy` binary turns the governance flags on by
# default so released builds expose tiered pricing, agent-class
# resolution, the HTTP ledger client, content negotiation, and the four
# policy-graph projections without extra cargo flags. Library consumers
# depending on `sbproxy-modules` or `sbproxy-core` directly leave these
# OFF and opt in per crate.
#
# Forwarded features (see docs/AIGOVERNANCE-BUILD.md):
# - tiered-pricing -> sbproxy-modules/tiered-pricing
# - agent-class -> sbproxy-core/agent-class
# - http-ledger -> sbproxy-modules/http-ledger
#
# Forwarded features (see docs/AIGOVERNANCE-BUILD.md):
# - content-negotiate -> sbproxy-modules/content-negotiate
# - licensing-rsl -> sbproxy-modules/licensing-rsl
# - licensing-tdmrep -> sbproxy-modules/licensing-tdmrep
# - llms-txt -> sbproxy-modules/llms-txt
[features]
default = [
  "tiered-pricing",
  "agent-class",
  "http-ledger",
  "content-negotiate",
  "licensing-rsl",
  "licensing-tdmrep",
  "llms-txt",
  "tls-fingerprint",
  "inprocess-embed",
]
tiered-pricing = ["sbproxy-modules/tiered-pricing"]
# WOR-1235: in-process semantic-cache embedder (single-binary). Forwards to
# sbproxy-core/inprocess-embed.
inprocess-embed = ["sbproxy-core/inprocess-embed"]
agent-class = ["sbproxy-core/agent-class"]
http-ledger = ["sbproxy-modules/http-ledger"]
content-negotiate = ["sbproxy-modules/content-negotiate"]
licensing-rsl = ["sbproxy-modules/licensing-rsl"]
licensing-tdmrep = ["sbproxy-modules/licensing-tdmrep"]
llms-txt = ["sbproxy-modules/llms-txt"]
# Operators turn this off via Helm value
# `features.tlsFingerprint = false` when running on a tightly-budgeted
# free tier; on by default for the publishable matrix builds.
tls-fingerprint = ["sbproxy-core/tls-fingerprint"]
# WOR-227 (scaffold). Forwards through to `sbproxy-core/embed-admin-ui`.
# When on, the admin server embeds `ui/dist/` via `include_dir!` and
# serves the dashboard at `/admin/ui/*`. Off by default so the standard
# build does not require a prior `pnpm build` of the React scaffold.
# See `ui/README.md` for the build flow.
embed-admin-ui = ["sbproxy-core/embed-admin-ui"]

[dependencies]
sbproxy-core.workspace = true
sbproxy-config.workspace = true
sbproxy-modules.workspace = true
sbproxy-plugin.workspace = true
sbproxy-vault.workspace = true
tracing-subscriber.workspace = true
rustls.workspace = true
mimalloc.workspace = true

# `projections render` CLI subcommand needs to read the config and
# walk the projection cache directly.
anyhow.workspace = true
bytes.workspace = true

# WOR-180 plan / apply: the CLI parses YAML into `ConfigFile` for the
# diff walker (`sbproxy-config` runs `compile_config` for validation),
# and emits the plan envelope as pretty-printed JSON.
serde_yaml.workspace = true
serde_json.workspace = true

# WOR-180 step 5: `apply` takes an exclusive flock(2) on
# <yaml_path>.applylock so two concurrent operators do not race the
# same reload. fs2 is the cross-platform flock wrapper used by
# rustup, cargo, and others.
fs2.workspace = true

# CLI parsing. The binary uses clap derive for argv parsing, env-var
# fallbacks, `--help`/`--version`, and shell completions. Pinned at
# the workspace level via `version = "4"` so security bumps land in
# one place. `wrap_help` re-flows long doc strings to the terminal
# width; `env` enables `#[arg(env = "...")]` fallbacks; `string`
# lets clap take owned `String` defaults at runtime (used for the
# log-level resolver).
clap = { version = "4", features = ["derive", "env", "wrap_help", "string"] }
clap_complete = "4"
