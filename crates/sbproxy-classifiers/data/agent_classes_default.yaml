# Wave 1 default agent-class catalog.
#
# Embedded into the binary via include_str! and parsed into the
# `AgentClassCatalog` type at startup. Operators can extend or override
# entries inline in their own `sb.yml` (see ADR `adr-agent-class-taxonomy.md`).
#
# Field reference: see the `AgentClass` struct in
# `crates/sbproxy-classifiers/src/agent_class.rs`.
#
# rDNS suffixes are case-insensitive and forward-confirmed by
# `sbproxy-security::agent_verify::verify_reverse_dns` (G1.5).

agent_classes:
  - id: openai-gptbot
    vendor: OpenAI
    purpose: training
    contact_url: https://platform.openai.com/docs/gptbot
    expected_user_agent_pattern: "(?i)\\bGPTBot/\\d"
    expected_reverse_dns_suffixes:
      - .gptbot.openai.com
    expected_keyids: []
    robots_compliance_score: 0.95
    aliases: []
    deprecated: false

