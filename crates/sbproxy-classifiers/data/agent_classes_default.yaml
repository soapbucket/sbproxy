  # --- Wave 5 / G5.4: headless-browser detection ---
  #
  # These entries are emitted by the headless detector
  # (`sbproxy-security/headless_detect.rs`) when a request's TLS
  # fingerprint matches a published headless-library JA3/JA4. Their
  # `expected_user_agent_pattern` is intentionally a sentinel that
  # never matches a real header so the UA-matching path does not also
  # claim them; the resolver entry-point is the TLS fingerprint
  # signal, not the User-Agent string.

  - id: headless-browser
    vendor: Unknown
    purpose: unknown
    contact_url: https://github.com/soapbucket/sbproxy/blob/main/docs/adr-tls-fingerprint-pipeline.md
    expected_user_agent_pattern: "^__sbproxy_never_matches__$"
    expected_reverse_dns_suffixes: []
    expected_keyids: []
    robots_compliance_score: 0.10
    aliases: []
    deprecated: false

  - id: headless-puppeteer
    vendor: Puppeteer
    purpose: unknown
    contact_url: https://pptr.dev/
    expected_user_agent_pattern: "^__sbproxy_never_matches__$"
    expected_reverse_dns_suffixes: []
    expected_keyids: []
    robots_compliance_score: 0.10
    aliases: []
    deprecated: false

