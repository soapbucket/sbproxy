# Observability callbacks plus an external guardrail. Known sink callbacks
# (langfuse, datadog) emit real usage_sinks entries with env-interpolated
# credentials; the external guardrail still warns for manual wiring. The
# emitted config must still compile.
model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
litellm_settings:
  success_callback: ["langfuse", "datadog"]
  failure_callback: ["langfuse"]
guardrails:
  - guardrail_name: presidio-pii
    litellm_params:
      guardrail: presidio
      mode: pre_call
