# AI Provider Registry.
#
# Source of truth for known AI / LLM provider metadata. Loaded by the
# AI gateway at startup; the embedded copy ships with the binary, and
# operators may override via `proxy.ai_providers_file` in sb.yml to
# point at a custom catalog on disk.
#
# Each entry maps to `sbproxy_ai::providers::ProviderInfo`. Fields:
#   - name            : canonical identifier used in sb.yml
#   - display_name    : human-readable label
#   - aliases         : alternative names accepted by the lookup
#   - default_base_url: upstream API base URL
#   - auth_header     : HTTP header carrying the API key
#   - auth_prefix     : prefix prepended to the key (e.g. "Bearer ")
#   - format          : wire format - openai|anthropic|google|bedrock|custom
#   - supports_streaming
#   - supports_embeddings
#
# Adding providers: append an entry below; the registry will pick it up
# automatically on next startup. Replacing the embedded set entirely:
# point `proxy.ai_providers_file` at your own YAML.

providers:
  # --- Tier 1: Major cloud providers ---
  - name: openai
    display_name: OpenAI
    default_base_url: https://api.openai.com/v1
    auth_header: Authorization
    auth_prefix: "Bearer "
    format: openai
    supports_streaming: true
    supports_embeddings: true

  - name: anthropic
    display_name: Anthropic
    default_base_url: https://api.anthropic.com/v1
    auth_header: x-api-key
    auth_prefix: ""
    format: anthropic
    supports_streaming: true
    supports_embeddings: false

  - name: gemini
    display_name: Google Gemini
    aliases: [google]
    default_base_url: https://generativelanguage.googleapis.com/v1beta
