[package]
name = "sbproxy-observe"
version = "0.1.0"
edition = "2021"
license.workspace = true
publish = false

[dependencies]
sbproxy-plugin.workspace = true
sbproxy-util.workspace = true
# SSRF guard for alert webhook URLs (WOR-604). No cycle: sbproxy-security
# does not depend on sbproxy-observe.
sbproxy-security.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
prometheus.workspace = true
serde.workspace = true
# WOR-1081: JsonSchema on the capture/sink config types so the
# auto-generated `sb-config.schema.json` covers operator inputs
# that flow through observe.
schemars.workspace = true
serde_json.workspace = true
anyhow.workspace = true
# `serde` is on so PolicyVerdictEvent and other typed events can
# (de)serialise the UUID without an intermediate string conversion.
uuid = { workspace = true, features = ["v4", "serde"] }
ulid.workspace = true
regex.workspace = true
http.workspace = true
once_cell = "1"
parking_lot.workspace = true
rand.workspace = true
reqwest = { workspace = true }
tokio.workspace = true
# TaskTracker drains in-flight alert webhook deliveries on shutdown (WOR-652).
tokio-util.workspace = true
# `serde` is on so PolicyVerdictEvent.occurred_at can (de)serialise
# the timestamp directly without a custom adapter.
chrono = { workspace = true, features = ["serde"] }
hmac.workspace = true
sha2.workspace = true
hex.workspace = true
base64.workspace = true
thiserror.workspace = true
flate2 = "1"

# Outbound webhook framework: Ed25519 signing (preferred) with
# HMAC-SHA256 fallback. Already used in
# sbproxy-middleware; share the version.
ed25519-dalek = "2"

# OpenTelemetry OTLP export pipeline. Pinned together: each
# opentelemetry sub-crate version must align across the SDK,
# protocol, and tracing bridge. The `logs` feature flips on the
# OTLP-logs surface that WOR-1046 plumbs into the sink dispatcher;
# the trace + metrics surfaces remain wired the same way as before.
opentelemetry = { version = "0.27", features = ["trace", "metrics", "logs"] }
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio", "trace", "metrics", "logs"] }
opentelemetry-otlp = { version = "0.27", features = ["http-proto", "reqwest-client", "grpc-tonic", "trace", "metrics", "logs"] }
opentelemetry-semantic-conventions = "0.27"
tracing-opentelemetry = "0.28"

[dev-dependencies]
tempfile = "3"
# WOR-1186: validate emitted session-ledger records against the
# canonical schema (vendored copy under tests/).
jsonschema.workspace = true
