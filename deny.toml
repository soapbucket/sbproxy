# cargo-deny configuration for sbproxy.
#
# Run locally: cargo deny check
# Enforced in CI as part of the lint job. Failing this gate fails CI; the
# enterprise gate runs the same config. See SUPPLY-CHAIN.md section 4.3 for
# the rationale.
#
# Reference: https://embarkstudios.github.io/cargo-deny/
#
# When this config changes, update the rationale in the PR description and
# in SUPPLY-CHAIN.md if a category-level decision shifts.

[graph]
all-features = false
no-default-features = false
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]

[output]
feature-depth = 1

# --- Advisories ---------------------------------------------------------------
#
# The RustSec advisory database is the source of truth. Anything with a known
# vulnerability fails CI. Unmaintained and yanked crates warn so we see them
# in the lint output without blocking unrelated changes; we triage them in
# the next dependency-update PR.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# `unmaintained` is a scope setting in cargo-deny v0.16+. "workspace" reports
# only when a workspace crate directly depends on an unmaintained crate;
# transitive unmaintained findings are not gating. Triage them via the
# warning output in CI rather than blocking unrelated PRs.
unmaintained = "workspace"
ignore = [
  # Tracked transitive findings. Each entry should carry a comment naming
  # the crate, the pulling-in dependency, and the fix plan. Remove entries
  # when the upstream releases a patched version and Renovate has updated
  # Cargo.lock; CI will then enforce automatically.
  # protobuf 2.x: uncontrolled recursion. Locked in via prometheus 0.13 via
  # pingora 0.8 (the latest published pingora). Resolves when pingora upstream
  # publishes a release that bumps prometheus to a 3.x-compatible line.
  "RUSTSEC-2024-0437",
]

# --- Licenses -----------------------------------------------------------------
#
# Allowlist. Any crate whose license is not in this list fails CI. Add entries
# deliberately and document the reason in the PR. We do not ship copyleft
# (GPL, AGPL, LGPL) in the gateway.
#
# Wave 4 (B4.4) audit:
#   - pulldown-cmark 0.12         (MIT)  - HTML-to-Markdown projection (G4.3).
#   - pulldown-cmark-escape 0.11  (MIT)  - transitive of pulldown-cmark.
#   - quick-xml 0.37              (MIT)  - audit; landed via reqwest dep tree
#                                          (the licenses.xml emitter is
#                                          hand-rolled, not quick-xml).
# All three sit under the existing MIT allow entry; no new allow rules
# are required. The `cargo deny check` gate remains clean across the
# Wave 4 surface.

[licenses]
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Unlicense",
  "OpenSSL",
  # Mozilla CA root data, transitive via webpki-roots. Permissive for data;
  # documented at https://cdla.dev/permissive-2-0/.
  "CDLA-Permissive-2.0",
]
exceptions = []

# All workspace crates are publish = false (see CLAUDE.md). They are licensed
# under BUSL-1.1 (the project license, see LICENSE). cargo-deny does not need
# to police our own first-party license choices; the allowlist above governs
# transitive dependencies. Without this, every workspace crate would fail the
# license gate because BUSL-1.1 is not in the third-party allowlist.
[licenses.private]
ignore = true

# Crates with non-SPDX or no machine-readable license. Add entries here only
# after confirming the upstream license out of band.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# --- Bans ---------------------------------------------------------------------
#
# Multiple-version warnings are noisy in the Rust ecosystem; we accept them.
# Wildcard dependencies are forbidden because they break reproducibility.

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates use `path = "..."` without a version, which Cargo
# resolves as a wildcard. Allow the wildcard in that case so the gate still
# catches external `version = "*"` dependencies, which are the real risk.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# --- Sources ------------------------------------------------------------------
#
# Only crates.io. Git and path sources require explicit allowlisting in PR
# review; this gate prevents silent introduction of unaudited registries.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
