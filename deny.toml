# cargo-deny configuration for sbproxy.
#
# Run locally: cargo deny check
# Enforced in CI as part of the lint job. Failing this gate fails CI; the
# enterprise gate runs the same config. See SUPPLY-CHAIN.md section 4.3 for
# the rationale.
#
# Reference: https://embarkstudios.github.io/cargo-deny/
#
# When this config changes, update the rationale in the PR description and
# in SUPPLY-CHAIN.md if a category-level decision shifts.

[graph]
all-features = false
no-default-features = false
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]

[output]
feature-depth = 1

# --- Advisories ---------------------------------------------------------------
#
# The RustSec advisory database is the source of truth. Anything with a known
# vulnerability fails CI. Unmaintained and yanked crates warn so we see them
# in the lint output without blocking unrelated changes; we triage them in
# the next dependency-update PR.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# `unmaintained` is a scope setting in cargo-deny v0.16+. "all" detects every
# unmaintained crate in the graph, including transitive ones, and gates on
# them. We use "all" so each unmaintained finding must be explicitly triaged
# in the `ignore` list below with a named owner and a revisit trigger, rather
# than silently warned-and-forgotten. New transitive unmaintained crates that
# are not yet triaged will fail the gate, which is the intended signal: decide
# and document before merging (see WOR-616).
unmaintained = "all"
ignore = [
  # Tracked transitive findings. Each entry should carry a comment naming
  # the crate, the pulling-in dependency, and the fix plan. Remove entries
  # when the upstream releases a patched version and Renovate has updated
  # Cargo.lock; CI will then enforce automatically.
  # RUSTSEC-2024-0437: protobuf 2.x uncontrolled recursion when DECODING
  # untrusted protobuf. Reaches the graph only via prometheus 0.13.4 ->
  # pingora-core 0.8 (the latest published pingora); our direct prometheus
  # dep is 0.14 (protobuf 3.7.2). Not exploitable here: sbproxy only ENCODES
  # its own metrics through the prometheus client (the protobuf exposition
  # format is write-only on the /metrics path) and never decodes
  # attacker-supplied protobuf. Resolves when pingora upstream bumps
  # prometheus to a protobuf-3.x line; CI re-gates automatically once
  # Cargo.lock updates.
  "RUSTSEC-2024-0437",

  # --- AWS SDK: transitive rustls 0.21 -> rustls-webpki 0.101.7 ---
  # The three advisories below flag the unpatched `rustls-webpki 0.101.7`, which
  # the `aws-smithy-http-client 1.1.13` HTTP client pins through `rustls 0.21`.
  # The upstream AWS SDK has not yet bumped the smithy http client to the
  # rustls 0.23 line. None of the three advisories applies to the
  # `aws-sdk-secretsmanager` / `aws-sdk-sts` use case: we connect to
  # AWS-issued certificates over standard TLS chains and do not parse CA
  # certs with name constraints, do not consume Certificate Revocation
  # Lists, and do not verify wildcard DNS-name SANs against permitted
  # subtree constraints. Resolves when the AWS SDK bumps smithy-http-client
  # to a rustls 0.23 base; CI re-gates automatically once Cargo.lock updates.
  #
  # sbproxy-mesh peer-mTLS (peer_auth.rs) also uses rustls-webpki, but pins the
  # patched 0.103.13 (ISC-licensed), which is not vulnerable to any of these
  # three advisories, so the mesh path is clean regardless of these ignores.
  #
  # RUSTSEC-2026-0098: URI name constraints ignored on CA verification.
  "RUSTSEC-2026-0098",
  # RUSTSEC-2026-0099: permitted DNS subtree constraints accepted on
  # wildcard certs. We do not run a custom PKI; AWS service certs are
  # served from public CAs that do not use this constraint.
  "RUSTSEC-2026-0099",
  # RUSTSEC-2026-0104: panic when parsing empty CRLs. We do not configure
  # CRL parsing in the SDK; the default chain skips it entirely.
  "RUSTSEC-2026-0104",

  # --- WOR-616: unmaintained transitive crates -----------------------------
  # The following six advisories are all `unmaintained`-class warnings (not
  # active vulnerabilities; `cargo audit` reports 0 vulnerabilities). Each
  # crate enters the graph transitively through a direct dependency we cannot
  # patch from here, and none has a maintained drop-in replacement reachable
  # without an upstream bump. We ignore them so the supply-chain gate stays
  # green while keeping an owner and a revisit trigger per entry. Reassess at
  # each dependency bump; remove the entry once the named direct dep stops
  # pulling the crate.

  # RUSTSEC-2025-0012: backoff 0.4.0. Path: backoff -> kube-runtime -> kube
  # (direct dep) -> sbproxy-k8s-operator. Unmaintained, no maintained
  # replacement reachable; transitive; revisit when kube updates.
  "RUSTSEC-2025-0012",

  # RUSTSEC-2025-0069: daemonize 0.5.0. Path: daemonize -> pingora-core
  # (direct dep, latest published pingora 0.8). Unmaintained, no maintained
  # replacement reachable; transitive; revisit when pingora updates.
  "RUSTSEC-2025-0069",

  # RUSTSEC-2024-0388: derivative 2.2.0. Paths: derivative -> pingora-core
  # (direct dep) and derivative -> kube-runtime -> kube (direct dep).
  # Unmaintained, no maintained replacement reachable; transitive; revisit
  # when pingora and kube update.
  "RUSTSEC-2024-0388",

  # RUSTSEC-2024-0384: instant 0.1.13. Paths: instant -> notify-types ->
  # notify (direct dep) and instant -> backoff -> kube-runtime -> kube
  # (direct dep). Unmaintained, no maintained replacement reachable;
  # transitive; revisit when notify and kube update.
  "RUSTSEC-2024-0384",

  # RUSTSEC-2024-0436: paste 1.0.15. Paths: paste -> tract-* -> tract-onnx
  # (direct dep) and paste -> tokenizers (direct dep), both via
  # sbproxy-classifiers. Unmaintained, no maintained replacement reachable;
  # transitive; revisit when tract-onnx and tokenizers update.
  "RUSTSEC-2024-0436",

  # RUSTSEC-2025-0057: fxhash 0.2.1, unmaintained. Path: fxhash -> bm25 ->
  # mistralrs-core -> mistralrs -> sbproxy-model-host, i.e. only the
  # off-by-default `embedded` inference engine tree (WOR-1658); not in the
  # default build. Unmaintained, no maintained replacement reachable without
  # an upstream bump; transitive; revisit when bm25 / mistralrs update.
  "RUSTSEC-2025-0057",

  # RUSTSEC-2025-0119: number_prefix 0.4.0, unmaintained. Same off-by-default
  # mistral.rs `embedded` tree (via indicatif's progress UI under mistralrs);
  # not in the default build. Unmaintained; transitive; revisit on an upstream
  # bump that drops it.
  "RUSTSEC-2025-0119",

  # RUSTSEC-2026-0173: proc-macro-error2 (a maintained fork of the older
  # proc-macro-error) is now itself unmaintained. Pulled in transitively as a
  # build-time proc-macro by the tonic/prost gRPC stack; no runtime artifact
  # and no maintained replacement reachable without an upstream bump. Predates
  # this change. Transitive; revisit when tonic/prost drop it.
  "RUSTSEC-2026-0173",

  # RUSTSEC-2025-0134: rustls-pemfile 2.2.0. Paths: rustls-pemfile ->
  # pingora-rustls -> pingora-core (direct dep), -> object_store (direct
  # dep), -> kube-client -> kube (direct dep), and -> axum-server (direct
  # dep). The workspace's own direct rustls-pemfile use is already retired in
  # favor of rustls-pki-types; only these transitive copies remain.
  # Unmaintained, no maintained replacement reachable; transitive; revisit
  # when pingora, object_store, kube, and axum-server update.
  "RUSTSEC-2025-0134",

  # --- quick-xml 0.37.5 DoS advisories (transitive via object_store) -------
  # These two are `vulnerability`-class (not merely unmaintained), so they
  # are ignored with a tighter rationale. Path: quick-xml -> object_store
  # 0.11.2 (direct dep of sbproxy-modules, the cloud blob-storage config
  # backend) -> sbproxy-modules. quick-xml never parses proxy request bodies
  # or MCP traffic; the only XML it decodes is the LIST/GET responses from
  # the operator's own configured object store (S3/GCS/Azure), so the DoS
  # surface is an operator-trusted endpoint, not attacker-controlled input.
  # The fix is in quick-xml 0.38, which object_store 0.11's `^0.37` bound
  # does not allow; there is no compatible patched release. Predates this
  # change and is present on main. Transitive; revisit when object_store
  # bumps its quick-xml floor to a 0.38 line.
  #
  # RUSTSEC-2026-0194: quadratic run time checking a start tag for duplicate
  # attribute names.
  "RUSTSEC-2026-0194",
  # RUSTSEC-2026-0195: unbounded namespace-declaration allocation in
  # `NsReader` (memory-exhaustion DoS).
  "RUSTSEC-2026-0195",
]

# --- Licenses -----------------------------------------------------------------
#
# Allowlist. Any crate whose license is not in this list fails CI. Add entries
# deliberately and document the reason in the PR. We do not ship copyleft
# (GPL, AGPL, LGPL) in the gateway.
#
# Wave 4 (B4.4) audit:
#   - pulldown-cmark 0.12         (MIT)  - HTML-to-Markdown projection (G4.3).
#   - pulldown-cmark-escape 0.11  (MIT)  - transitive of pulldown-cmark.
#   - quick-xml 0.37              (MIT)  - audit; landed via reqwest dep tree
#                                          (the licenses.xml emitter is
#                                          hand-rolled, not quick-xml).
# All three sit under the existing MIT allow entry; no new allow rules
# are required. The `cargo deny check` gate remains clean across the
# Wave 4 surface.

[licenses]
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Unlicense",
  "OpenSSL",
  # Mozilla CA root data, transitive via webpki-roots. Permissive for data;
  # documented at https://cdla.dev/permissive-2-0/.
  "CDLA-Permissive-2.0",
]
exceptions = []

# All workspace crates are publish = false (see CLAUDE.md). They are licensed
# under Apache-2.0 (the project license, see LICENSE). Apache-2.0 is already in
# the third-party allowlist above, but keeping our own first-party crates out
# of the license gate is still correct: cargo-deny does not need to police our
# own license choices, and the allowlist governs transitive dependencies.
[licenses.private]
ignore = true

# Crates with non-SPDX or no machine-readable license. Add entries here only
# after confirming the upstream license out of band.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# --- Bans ---------------------------------------------------------------------
#
# Multiple-version warnings are noisy in the Rust ecosystem; we accept them.
# Wildcard dependencies are forbidden because they break reproducibility.

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates use `path = "..."` without a version, which Cargo
# resolves as a wildcard. Allow the wildcard in that case so the gate still
# catches external `version = "*"` dependencies, which are the real risk.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# --- Sources ------------------------------------------------------------------
#
# Only crates.io. Git and path sources require explicit allowlisting in PR
# review; this gate prevents silent introduction of unaudited registries.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
