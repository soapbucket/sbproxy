# Synthetic monitor (B1.9).
#
# Runs the `bench-synthetic` Wave 1 probe against the bundled
# observability + proxy stack on demand: add the `run-synthetic`
# label to a PR or fire via workflow_dispatch. The probe issues the
# 402 challenge + redemption flow against the mock ledger configured
# in the local stack and emits one JSON line per probe on stdout.
#
# Wave 1 ships only the `--rail=none` probe. Other rails (Stripe test,
# x402, MPP) are stubbed in `bench-synthetic/src/main.rs` and will be
# wired in Waves 2 and 3 (B2.12, B3.4, B3.5).
#
# On failure the workflow opens a GitHub issue tagged `synthetic` with
# the probe's stdout in the body. Operators page on that label per
# `docs/runbooks/synthetic-monitor.md` (placeholder until R-runbooks
# lane lands).

name: synthetic

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch: {}

# Only one nightly run at a time per branch. A second push to main
# while the previous run is in flight just supersedes the older one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for the failure-notification step to file a GH issue.
  issues: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  synthetic-probe:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-synthetic')
    name: synthetic probe (rail=none)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      # `bench-synthetic` is its own workspace, so it gets a dedicated
      # cache key. That keeps the proxy workspace cache from being
      # invalidated by churn on the synthetic harness.
      - uses: Swatinem/rust-cache@v2.7.3
        with:
          shared-key: synthetic
          workspaces: bench-synthetic

      # Boot the reference observability stack from
      # examples/observability-stack and the bundled crawl-tiered
      # example so the probe has a proxy to talk to with a real
      # ai_crawl_control policy in front of a mock ledger.
      - name: bring up observability stack
        run: |
          set -euo pipefail
          ( cd examples/observability-stack && docker compose up -d --wait )

      - name: bring up tiered crawl example
        id: stack
        run: |
          set -euo pipefail
          ( cd examples/ai-crawl-tiered && docker compose up -d --wait )
          # The example publishes the proxy on host port 8080 by
          # default. Expose it as a step output so the probe step
          # below can interpolate it.
          echo "proxy_port=8080" >> "${GITHUB_OUTPUT}"

      - name: run synthetic probe
        id: probe
        run: |
          set -euo pipefail
          mkdir -p target/synthetic-logs
          PORT="${{ steps.stack.outputs.proxy_port }}"
          # `--target` is the proxy base URL. `--path` defaults inside
          # the binary to /_synthetic/probe; we pass /article so the
          # bundled crawl-tiered example's html-default tier matches.
          if ! ( cd bench-synthetic && cargo run --release -- \
                   --rail=none \
                   --target="http://127.0.0.1:${PORT}" \
                   --path="/article" \
                   --iterations=1 ) | tee ../target/synthetic-logs/probe.jsonl ; then
            echo "probe_failed=true" >> "${GITHUB_OUTPUT}"
            exit 1
          fi
          # Defence in depth: parse the JSONL and explicitly fail if
          # any line reports a non-`ok` result. The probe binary already
          # exits 1 on any non-`ok`, but we re-check here so a future
          # change that loosens the binary's exit policy still gets
          # caught.
          if grep -E '"result":"(error|timeout)"' target/synthetic-logs/probe.jsonl; then
            echo "probe_failed=true" >> "${GITHUB_OUTPUT}"
            exit 1
          fi

      - name: upload probe output
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: synthetic-probe-output
          path: target/synthetic-logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: tear down stacks
        if: always()
        run: |
          set -eu
          ( cd examples/ai-crawl-tiered && docker compose down -v --remove-orphans ) || true
          ( cd examples/observability-stack && docker compose down -v --remove-orphans ) || true

      # Failure notification. Opens a GitHub issue with the probe
      # output. Operator routing of that issue (Slack page, PagerDuty
      # webhook) is documented in the runbook; this step is the
      # first-line signal.
      - name: failure-notification
        if: failure()
        uses: actions/github-script@v8
        env:
          PROBE_OUTPUT_FILE: target/synthetic-logs/probe.jsonl
        with:
          script: |
            const fs = require('fs');
            let body = '';
            const path = process.env.PROBE_OUTPUT_FILE;
            if (path && fs.existsSync(path)) {
              body = fs.readFileSync(path, 'utf8');
            } else {
              body = '(probe produced no JSONL output - see workflow logs)';
            }
            const ts = new Date().toISOString();
            const issueBody = [
              'Wave 1 synthetic monitor failed.',
              '',
              '- run: ' + (process.env.GITHUB_RUN_ID || '(unknown)'),
              '- ref: ' + (process.env.GITHUB_REF || '(unknown)'),
              '- when: ' + ts,
              '',
              '### Probe stdout',
              '',
              '```jsonl',
              body.trim(),
              '```',
              '',
              'Operator runbook: `docs/runbooks/synthetic-monitor.md`.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Synthetic monitor failed (Wave 1)',
              body: issueBody,
              labels: ['synthetic', 'wave1', 'incident']
            });

  # Chaos test: rapid hot-reload under sustained traffic (WOR-28).
  #
  # The reload state machine has unit + loom coverage. This job
  # exercises the integrated story: a live proxy serving real HTTP
  # traffic while the operator reload path swaps the compiled
  # pipeline out from under it. Asserts zero dropped connections,
  # zero misrouted requests, and zero unexpected 5xx.
  #
  # Runs on demand (label or workflow_dispatch) because the
  # wall-clock budget plus 200-thread fan-out is too expensive for
  # the per-PR e2e lane. The test is `#[ignore]` by default; this
  # job runs it via `--ignored`, mirroring the pattern in
  # licensing-conformance.yml.
  chaos-hot-reload:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-synthetic')
    name: chaos hot-reload (WOR-28)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.7.3
        with:
          shared-key: chaos-hot-reload

      - name: install protoc + libclang
        # Mirror ci.yml's toolchain prerequisites; the e2e crate
        # transitively pulls in tonic-build for the gRPC test, which
        # needs protoc on the build host.
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libclang-dev clang

      - name: build sbproxy binary
        # The e2e harness spawns this binary at runtime; cargo cannot
        # infer the ordering between the e2e crate and the binary
        # crate, so build it explicitly first.
        run: cargo build -p sbproxy --locked

      - name: chaos hot-reload e2e
        # `--ignored` rather than `--include-ignored` so this job
        # only runs the chaos test, not every other e2e in the crate.
        run: |
          set -euo pipefail
          mkdir -p target/chaos-logs
          cargo test -p sbproxy-e2e --locked \
            --test chaos_hot_reload \
            -- --ignored --nocapture 2>&1 \
            | tee target/chaos-logs/cargo-test-output.txt

      - name: upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: chaos-hot-reload-logs
          path: target/chaos-logs/
          retention-days: 14
          if-no-files-found: ignore
