# Best-effort darwin_amd64 (Intel Mac) build for tagged releases.
#
# Why a separate workflow: the GitHub macos-13 runner pool has
# multi-hour queue times that, when wired into the release.yml matrix,
# stall the publish job indefinitely. Splitting the Intel Mac build
# into its own workflow lets the main release publish on time and
# uploads the Intel binary asynchronously when the runner eventually
# picks up. Apple Silicon Mac and both Linux arches build in the main
# release.yml on healthy runner pools.
#
# This workflow uses `gh release upload --clobber` so it can attach to
# a release that already exists. If the release publish in release.yml
# has not finished yet when this job runs, the upload step retries
# briefly and then exits non-zero; that does not affect the release
# itself.

name: release darwin_amd64 (best-effort)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build-and-upload:
    name: build and upload darwin_amd64
    if: github.repository == 'soapbucket/sbproxy'
    runs-on: macos-13
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-apple-darwin

      - name: build release binary
        run: cargo build --release --locked --target x86_64-apple-darwin --bin sbproxy

      - name: package tarball
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p dist
          STAGE="sbproxy-${TAG}-darwin_amd64"
          mkdir -p "${STAGE}"
          cp "target/x86_64-apple-darwin/release/sbproxy" "${STAGE}/sbproxy"
          cp LICENSE NOTICE README.md SECURITY.md SUPPLY-CHAIN.md "${STAGE}/" 2>/dev/null || true
          tar -czf "dist/sbproxy_darwin_amd64.tar.gz" -C "${STAGE}" .
          (cd dist && shasum -a 256 "sbproxy_darwin_amd64.tar.gz" > "sbproxy_darwin_amd64.tar.gz.sha256")
          ls -la dist/

      - name: upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # Wait up to 30 minutes for the main release to be published
          # (release.yml may still be running). After that, give up; the
          # operator can re-run this workflow manually once the main
          # release is live.
          for i in {1..30}; do
            if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              echo "release ${TAG} found; uploading"
              gh release upload "${TAG}" \
                --repo "${GITHUB_REPOSITORY}" \
                --clobber \
                dist/sbproxy_darwin_amd64.tar.gz \
                dist/sbproxy_darwin_amd64.tar.gz.sha256
              exit 0
            fi
            echo "release ${TAG} not yet published; retry in 60s (${i}/30)"
            sleep 60
          done
          echo "release ${TAG} never appeared within 30m; re-run this workflow once the main release publishes"
          exit 1
