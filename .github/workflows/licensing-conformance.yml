# Wave 4 / B4.5 licensing-conformance gate.
#
# Validates the Wave 4 policy-graph projections (`/licenses.xml`,
# `/.well-known/tdmrep.json`) against their canonical upstream
# schemas:
#
#   - RSL 1.0 XSD       fetched from https://rsl.ai/spec/1.0/rsl.xsd
#   - W3C TDMRep schema fetched from the W3C TDMRep working draft
#
# The workflow runs in two modes:
#
#   1. On tag push (v*): re-fetches the upstream schemas, diffs
#      against the vendored copies in e2e/fixtures/rsl/ /
#      e2e/fixtures/tdmrep/, and runs the e2e schema-validation tests
#      against the freshly fetched copies. If the upstream changed,
#      a bot PR is opened with the new vendored schema files. This
#      gates the release.
#   2. On manual dispatch (workflow_dispatch): same as mode 1,
#      skipping any cache, useful for ad-hoc audits.

name: licensing-conformance

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      bypass_cache:
        description: 'Skip the schema cache and re-fetch upstream'
        required: false
        default: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  # --- Upstream schema URLs ---
  #
  # Bumping a URL requires a corresponding refresh of the vendored
  # copy in e2e/fixtures/. The scheduled cron lane below does this
  # automatically; unscheduled bumps need a follow-up PR.
  RSL_XSD_URL: 'https://rsl.ai/spec/1.0/rsl.xsd'
  TDMREP_SCHEMA_URL: 'https://www.w3.org/community/reports/tdmrep/CG-FINAL-tdmrep-20240202/schema/tdmrep.json'

jobs:

  # --- Upstream schema sync (tag push + dispatch) ---
  #
  # Re-fetches the upstream RSL XSD + W3C TDMRep JSON Schema, compares
  # against the vendored copies, and opens a bot PR if anything
  # changed. Runs on tag push (gating the release) and on
  # workflow_dispatch (ad-hoc audits).
  sync-upstream:
    name: upstream schema sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: install curl + diff
        run: |
          sudo apt-get update
          sudo apt-get install -y curl diffutils

      # --- Cache the upstream fetches per 7-day TTL ---
      #
      # The cache key includes the ISO week so a fresh fetch happens
      # at most once per calendar week. workflow_dispatch with
      # bypass_cache=true skips the cache and forces a fresh fetch.
      - name: cache key
        id: cache_key
        run: |
          set -eu
          week=$(date -u +%Y-W%V)
          if [ "${{ github.event.inputs.bypass_cache }}" = "true" ]; then
            echo "key=licensing-schemas-${week}-$(date -u +%s)" >> "$GITHUB_OUTPUT"
          else
            echo "key=licensing-schemas-${week}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/cache@v5
        id: schema_cache
        with:
          path: |
            /tmp/rsl.xsd.fresh
            /tmp/tdmrep.schema.fresh
          key: ${{ steps.cache_key.outputs.key }}

      # Both upstreams have proven unreliable: rsl.ai/spec/1.0/rsl.xsd
      # serves an HTML JS-redirect, the W3C TDMRep CG-FINAL URL has
      # 404'd through several path renames, and there is no canonical
      # XSD or JSON Schema published for either standard at the time
      # of this writing (see WOR-178 closure for the audit). The fetch
      # step is best-effort: a 404 must NOT fail the job. Downstream
      # diff / PR steps gate on the fetched files being non-empty XSD
      # or JSON, so a redirect-page or empty body is treated the same
      # as a 404.
      - name: fetch upstream schemas
        if: steps.schema_cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          set -uo pipefail
          rm -f /tmp/rsl.xsd.fresh /tmp/tdmrep.schema.fresh
          curl -fsSL --retry 3 --retry-delay 5 \
            -o /tmp/rsl.xsd.fresh \
            "${{ env.RSL_XSD_URL }}" \
            || echo "WARN: RSL XSD fetch failed (URL may be unreliable, see WOR-178)"
          curl -fsSL --retry 3 --retry-delay 5 \
            -o /tmp/tdmrep.schema.fresh \
            "${{ env.TDMREP_SCHEMA_URL }}" \
            || echo "WARN: TDMRep schema fetch failed (URL may be unreliable, see WOR-178)"

      - name: diff against vendored copies
        id: diff
        run: |
          set -eu
          changed=0
          rsl_skipped=0
          tdmrep_skipped=0
          # An empty file or a body that does not look like an XSD
          # (e.g. the rsl.ai HTML JS-redirect) is treated the same as
          # a 404: skip the diff for that schema and report.
          if [ ! -s /tmp/rsl.xsd.fresh ] || ! grep -q "<xs:schema" /tmp/rsl.xsd.fresh; then
            echo "RSL upstream unavailable or non-XSD body; skipping diff for RSL"
            rsl_skipped=1
          elif [ -f e2e/fixtures/rsl/rsl-1.0.xsd ]; then
            if ! diff -q /tmp/rsl.xsd.fresh e2e/fixtures/rsl/rsl-1.0.xsd >/dev/null 2>&1; then
              echo "RSL XSD changed upstream"
              changed=1
            fi
          else
            echo "RSL XSD not yet vendored - first sync"
            changed=1
          fi
          # Same shape: skip if the body is missing or does not look
          # like JSON Schema.
          if [ ! -s /tmp/tdmrep.schema.fresh ] || ! grep -q "\$schema\|\"type\"" /tmp/tdmrep.schema.fresh; then
            echo "TDMRep upstream unavailable or non-JSON-Schema body; skipping diff for TDMRep"
            tdmrep_skipped=1
          elif [ -f e2e/fixtures/tdmrep/tdmrep.schema.json ]; then
            if ! diff -q /tmp/tdmrep.schema.fresh e2e/fixtures/tdmrep/tdmrep.schema.json >/dev/null 2>&1; then
              echo "TDMRep JSON Schema changed upstream"
              changed=1
            fi
          else
            echo "TDMRep schema not yet vendored - first sync"
            changed=1
          fi
          # If both upstreams skipped, force changed=0 so the open-PR
          # step does not fire on an empty diff.
          if [ "$rsl_skipped" = "1" ] && [ "$tdmrep_skipped" = "1" ]; then
            changed=0
            echo "Both upstreams unavailable; nothing to diff."
          fi
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "rsl_skipped=${rsl_skipped}" >> "$GITHUB_OUTPUT"
          echo "tdmrep_skipped=${tdmrep_skipped}" >> "$GITHUB_OUTPUT"

      - name: stage updated vendored copies
        if: steps.diff.outputs.changed == '1'
        run: |
          set -eu
          mkdir -p e2e/fixtures/rsl e2e/fixtures/tdmrep
          cp /tmp/rsl.xsd.fresh e2e/fixtures/rsl/rsl-1.0.xsd
          cp /tmp/tdmrep.schema.fresh e2e/fixtures/tdmrep/tdmrep.schema.json

      - name: open PR with refreshed vendored copies
        if: steps.diff.outputs.changed == '1'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/licensing-schemas-refresh
          delete-branch: true
          title: 'chore(e2e): refresh vendored RSL + TDMRep schemas'
          commit-message: |
            chore(e2e): refresh vendored RSL + TDMRep schemas

            Auto-generated by the licensing-conformance workflow's weekly
            sync. Re-fetches the upstream RSL 1.0 XSD and W3C TDMRep JSON
            Schema and updates the vendored copies under e2e/fixtures/.

            Review the diff for any breaking schema changes before merging.
          body: |
            ## What

            Auto-refresh of the vendored RSL + TDMRep schema files used by the
            `licensing-conformance` workflow:

            - `e2e/fixtures/rsl/rsl-1.0.xsd`
            - `e2e/fixtures/tdmrep/tdmrep.schema.json`

            ## Why

            The licensing-conformance workflow's weekly sync detected a
            divergence between the vendored copy and the upstream document.

            ## Test plan

            - [ ] Inspect the schema diff for breaking changes.
            - [ ] Run `cargo test -p sbproxy-e2e --release --test rsl_licenses_projection_e2e --test tdmrep_projection_e2e -- --include-ignored` locally.
            - [ ] Confirm the projected `/licenses.xml` and `/.well-known/tdmrep.json` documents still validate.
            - [ ] Update `crates/sbproxy-modules/src/projections/{licenses,tdmrep}.rs` if the schema diff requires emitter changes.
          labels: |
            automation
            licensing-conformance

      - name: report schema status
        run: |
          if [ "${{ steps.diff.outputs.rsl_skipped }}" = "1" ] || [ "${{ steps.diff.outputs.tdmrep_skipped }}" = "1" ]; then
            echo "Upstream schema availability:"
            echo "  RSL:    $([ "${{ steps.diff.outputs.rsl_skipped }}" = "1" ] && echo unavailable || echo ok)"
            echo "  TDMRep: $([ "${{ steps.diff.outputs.tdmrep_skipped }}" = "1" ] && echo unavailable || echo ok)"
            echo "See WOR-178 for the upstream-availability audit."
          fi
          if [ "${{ steps.diff.outputs.changed }}" = "1" ]; then
            echo "Upstream schema drift detected; PR opened."
          else
            echo "No schema drift; nothing to do."
          fi
