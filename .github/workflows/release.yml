# Release pipeline for SBproxy.
#
# Activates on tags matching v*.*.*. Produces signed binaries (4 platforms),
# signed multi-arch Docker images on ghcr.io, a CycloneDX SBOM, and SLSA
# build provenance attestations. All signing is keyless via Sigstore +
# GitHub OIDC; the expected cert identity for tag vX.Y.Z is documented in
# SUPPLY-CHAIN.md.
#
# Every publish-side job is guarded by
# `if: github.repository == 'soapbucket/sbproxy'` so the workflow stays
# inert on forks.
#
# Model-host certification gate (WOR-1858): `certify-model-host-*`
# below run scripts/certify-model-host.sh and the deterministic
# model-host DoD suite on every release tag and dispatch, and the
# `release` / `image` publish jobs `needs` both. Before WOR-1858,
# certify-model-host.sh was a script a human had to remember to run by
# hand against a provisioned GPU box; nothing stopped a release from
# shipping with zero executable hardware evidence. Arming it here means
# a failing lane blocks the draft release and the image push, not just
# a stale doc claim.
#
# certify-model-host-apple-silicon runs the real DoD checklist (cold
# completion, warm completion, kill -9 recovery) against a real
# `sbproxy run` + managed llama-server on the runner's own Apple
# Silicon GPU (macos-14 runners are M-series hardware, not emulated).
# NVIDIA single/multi-GPU certification is NOT included: no
# GitHub-hosted runner has a GPU, and this repository has no
# self-hosted GPU runner registered today. Per docs/model-host-capabilities.md,
# engine.vllm_uv, engine.vllm_container, platform.nvidia_cuda, and
# cluster.remote_dispatch stay `preview` until a GPU runner exists and
# a lane is added here to certify them; that is tracked as a follow-up
# to WOR-1858, not silently claimed as covered by this workflow.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: build artifacts but do not publish or sign'
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux_amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux_arm64
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: darwin_arm64
          # darwin_amd64 (Intel Mac) is not built. The GitHub macos-13
          # runner pools have multi-hour queue times that stalled
          # every release attempt, and Apple Silicon has been the
          # default for new Macs since 2020. Intel Mac users run the
          # linux_amd64 binary under Docker or build from source. See
          # `scripts/install.sh` for the same fallback message.

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # The binary pulls in sbproxy-classifier-proto / sbproxy-classifiers,
      # whose build scripts run prost/tonic codegen and need `protoc` on
      # PATH. rquickjs-sys's bindgen also needs libclang on Linux. ci.yml
      # installs these for its build/test job; the release runners are
      # separate machines, so they need the same install or the build
      # fails with "Could not find `protoc`".
      - name: install protoc and build deps
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y protobuf-compiler libclang-dev clang
              ;;
            macOS)
              brew install protobuf
              ;;
          esac

      # WOR-1781: build the admin SPA and embed it, so shipped binaries
      # serve the dashboard at /admin/ui instead of "Admin UI not built".
      # ui/dist is gitignored (only a keepfile is tracked), so the release
      # lane must produce it before cargo embeds it via include_dir.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: build admin ui
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin sbproxy --features embed-admin-ui

      - name: package tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          STAGE="sbproxy-${GITHUB_REF_NAME}-${{ matrix.platform }}"
          mkdir -p "${STAGE}"
          cp "target/${{ matrix.target }}/release/sbproxy" "${STAGE}/sbproxy"
          cp LICENSE NOTICE README.md SECURITY.md SUPPLY-CHAIN.md "${STAGE}/" 2>/dev/null || true
          # Pack the CONTENTS of the staging dir (binary, license, readme)
          # so the tarball extracts to a flat layout: sbproxy + LICENSE etc.
          # at root. Matches the Go v0.1.x convention so install.sh and
          # the Homebrew formula find the binary at the expected path.
          tar -czf "dist/sbproxy_${{ matrix.platform }}.tar.gz" -C "${STAGE}" .
          (cd dist && shasum -a 256 "sbproxy_${{ matrix.platform }}.tar.gz" > "sbproxy_${{ matrix.platform }}.tar.gz.sha256")

      - name: upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: bin-${{ matrix.platform }}
          path: dist/
          retention-days: 7

  sbom:
    name: sbom (cyclonedx)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: generate cyclonedx sbom
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json
          output-file: sbom.cyclonedx.json

      - name: upload sbom
        uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 7

  certify-model-host-deterministic:
    name: model-host certification / deterministic gate (WOR-1858)
    # Arms the "Deterministic gate" from docs/model-host-certification.md
    # as a required release check. These suites need no GPU: they prove
    # immutable artifact selection, process argv, container isolation,
    # source-build publication, per-device capacity, bounded queue
    # behavior, atomic rollback, status shape, and CLI contracts. They
    # cannot prove a driver loads a model or returns tokens on real
    # hardware; certify-model-host-apple-silicon below covers that.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: certify-model-host-deterministic

      - name: install protoc and libclang
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang

      # The model_cluster_control / model_cluster_dispatch e2e suites
      # spawn target/debug/sbproxy at runtime; build it before the test
      # step below so they do not fail with "release binary missing".
      - name: build sbproxy binary (needed by e2e harness)
        run: cargo build -p sbproxy --locked

      - name: record version metadata
        run: |
          set -euo pipefail
          echo "git revision: $(git rev-parse HEAD)"
          echo "git ref:      ${GITHUB_REF_NAME}"
          echo "runner:       $(uname -srm)"

      - name: deterministic model-host DoD suite
        run: |
          set -euo pipefail
          cargo test -p sbproxy-model-host --test engine_drivers --locked
          cargo test -p sbproxy-model-host --test cuda_build --locked
          cargo test -p sbproxy-model-host --test runtime_reconcile --locked
          cargo test -p sbproxy-model-host --test local_admission --locked
          cargo test -p sbproxy-core --test model_host_reload --locked
          cargo test -p sbproxy --test models_lifecycle_cli --locked
          cargo test -p sbproxy-model-host --test placement --locked
          cargo test -p sbproxy-model-host --test capability_contract --locked
          cargo test -p sbproxy-ai --test managed_replica_routing --locked
          cargo test -p sbproxy-core --test cluster_control_plane --locked
          cargo test -p sbproxy-core --test model_plane_envelope --test model_plane_transport --test managed_replica_dispatch --locked
          SBPROXY_E2E_BIN=target/debug/sbproxy cargo test -p sbproxy-e2e --test model_cluster_control --locked -- --nocapture
          SBPROXY_E2E_BIN=target/debug/sbproxy cargo test -p sbproxy-e2e --test model_cluster_dispatch --locked -- --nocapture

  certify-model-host-apple-silicon:
    name: model-host certification / Apple Silicon (WOR-1858)
    # Arms scripts/certify-model-host.sh as a required release check by
    # running it for real: boots `sbproxy run` with a managed
    # llama-server on the runner's own Apple Silicon GPU, then drives a
    # cold completion, a warm completion, and a kill -9 mid-flight
    # recovery against it. This is the same procedure previously
    # recorded by hand in docs/model-host-certification.md's "Apple
    # Metal gate for this PR" section; it now runs on every release
    # instead of relying on a human to run it before merging a PR.
    #
    # `sbproxy run <model>` synthesizes a config with origins
    # "127.0.0.1" and "localhost" only (crates/sbproxy/src/main.rs
    # prepare_run()); it does not recognize the "ai.local" hostname
    # certify-model-host.sh defaults to for `serve:`-block deployments,
    # so SB_HOST is pinned to 127.0.0.1 below to match.
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: certify-model-host-apple-silicon

      - name: build release binary
        run: cargo build --release -p sbproxy --locked

      - name: record version metadata
        run: |
          set -euo pipefail
          echo "git revision: $(git rev-parse HEAD)"
          echo "git ref:      ${GITHUB_REF_NAME}"
          sw_vers
          uname -srm
          sysctl -n machdep.cpu.brand_string || true

      - name: boot sbproxy and certify against it
        env:
          MODEL: qwen2.5-0.5b-instruct
        run: |
          set -uo pipefail
          CACHE_DIR="$(mktemp -d)"
          ./target/release/sbproxy run "${MODEL}" \
            --variant q4_k_m \
            --cache-dir "${CACHE_DIR}" \
            --port 48123 \
            --admin-port 48124 \
            > /tmp/sbproxy-cert-boot.log 2>&1 &
          SB_PID=$!

          # Wait for the HTTP port to accept connections. This only
          # proves the process is up; certify-model-host.sh's own
          # cold-call timeout (600s) separately absorbs the time to
          # load the model on first request.
          ready=0
          for _ in $(seq 1 60); do
            if curl -sf -o /dev/null "http://127.0.0.1:48123/v1/models"; then
              ready=1
              break
            fi
            if ! kill -0 "${SB_PID}" 2>/dev/null; then
              echo "sbproxy exited before its port came up" >&2
              break
            fi
            sleep 2
          done
          if [ "${ready}" -ne 1 ]; then
            echo "sbproxy never opened :48123" >&2
            cat /tmp/sbproxy-cert-boot.log >&2 || true
            kill "${SB_PID}" 2>/dev/null || true
            exit 1
          fi

          # Best-effort: find the managed llama-server child so the
          # kill -9 recovery lane runs too. A miss just SKIPs that one
          # line in certify-model-host.sh; it does not fail the job.
          ENGINE_PID="$(pgrep -f llama-server | head -n1 || true)"

          set +e
          SB_URL="http://127.0.0.1:48123" SB_HOST=127.0.0.1 MODEL="${MODEL}" \
            ENGINE_PID="${ENGINE_PID}" \
            bash scripts/certify-model-host.sh
          CERT_STATUS=$?
          set -e

          kill "${SB_PID}" 2>/dev/null || true
          exit "${CERT_STATUS}"

      - name: upload boot log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: model-host-cert-apple-silicon-log
          path: /tmp/sbproxy-cert-boot.log
          retention-days: 14

  release:
    name: publish release
    if: github.repository == 'soapbucket/sbproxy' && !inputs.dry_run
    needs: [build, sbom, certify-model-host-deterministic, certify-model-host-apple-silicon]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5

      - name: download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: stage release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name 'sbom.cyclonedx.json' \) -exec cp {} dist/ \;
          ls -la dist/

      - uses: sigstore/cosign-installer@v3

      - name: sign binaries with cosign (keyless)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          for tarball in dist/sbproxy_*.tar.gz; do
            cosign sign-blob --yes \
              --bundle "${tarball}.cosign.bundle" \
              "${tarball}"
          done
          ls -la dist/

      - name: attest build provenance for binaries
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/sbproxy_*.tar.gz'

      - name: create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file CHANGELOG.md \
            --draft \
            dist/*

  image:
    name: publish container image
    if: github.repository == 'soapbucket/sbproxy' && !inputs.dry_run
    needs: [build, sbom, certify-model-host-deterministic, certify-model-host-apple-silicon]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5

      - name: download binaries
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: bin-*

      - name: download sbom
        uses: actions/download-artifact@v5
        with:
          name: sbom
          path: artifacts/sbom

      - name: prepare docker context
        shell: bash
        run: |
          set -euo pipefail
          # Tarballs are FLAT layout (built with `tar -C STAGE .`), so
          # the archive's first entry is "./" which clashes with /tmp's
          # sticky bit when we extract there directly. Stage each arch
          # in its own subdirectory we own, then move just the binary.
          mkdir -p docker-ctx/linux/amd64 docker-ctx/linux/arm64
          mkdir -p stage/amd64 stage/arm64
          tar -xzf artifacts/bin-linux_amd64/sbproxy_linux_amd64.tar.gz -C stage/amd64/
          tar -xzf artifacts/bin-linux_arm64/sbproxy_linux_arm64.tar.gz -C stage/arm64/
          mv stage/amd64/sbproxy docker-ctx/linux/amd64/sbproxy
          mv stage/arm64/sbproxy docker-ctx/linux/arm64/sbproxy
          chmod +x docker-ctx/linux/*/sbproxy
          cp artifacts/sbom/sbom.cyclonedx.json docker-ctx/sbom.cyclonedx.json
          cat > docker-ctx/Dockerfile <<'EOF'
          # syntax=docker/dockerfile:1.7
          FROM gcr.io/distroless/cc-debian12:nonroot
          ARG TARGETOS
          ARG TARGETARCH
          COPY ${TARGETOS}/${TARGETARCH}/sbproxy /usr/local/bin/sbproxy
          EXPOSE 8080 9090
          ENTRYPOINT ["/usr/local/bin/sbproxy"]
          EOF

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub (soapbucket org). Authenticates with an organization
      # access token stored as the DOCKERHUB_TOKEN secret; the login user
      # is the org namespace.
      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: soapbucket
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: derive tag
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "dockerhub_image=docker.io/soapbucket/sbproxy" >> "${GITHUB_OUTPUT}"

      - name: build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: docker-ctx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.dockerhub_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.dockerhub_image }}:latest
          provenance: true
          sbom: false

      - uses: sigstore/cosign-installer@v3

      - name: sign images with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          for ref in \
            "${{ steps.meta.outputs.image }}@${{ steps.push.outputs.digest }}" \
            "${{ steps.meta.outputs.dockerhub_image }}@${{ steps.push.outputs.digest }}"; do
            cosign sign --yes "$ref"
          done

      # Provenance MUST be pushed before the cosign SBOM attestation.
      # attest-build-provenance's push-to-registry replaces the image's
      # sha256-<digest>.att tag wholesale, so any attestation attached
      # earlier is wiped (v1.5.0 shipped without a registry-visible
      # CycloneDX attestation because of this). cosign attest appends to
      # the existing .att manifest, so it must run last.
      - name: attest build provenance for ghcr image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: attest build provenance for Docker Hub image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.meta.outputs.dockerhub_image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: attach sbom attestation to images
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          for ref in \
            "${{ steps.meta.outputs.image }}@${{ steps.push.outputs.digest }}" \
            "${{ steps.meta.outputs.dockerhub_image }}@${{ steps.push.outputs.digest }}"; do
            cosign attest --yes \
              --predicate docker-ctx/sbom.cyclonedx.json \
              --type cyclonedx \
              "$ref"
          done
