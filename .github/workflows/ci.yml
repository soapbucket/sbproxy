name: CI
# --- Workflow shape (updated 2026-05-03) ---
# 4 jobs run in parallel on every push/PR:
#
#   build / test  (≈9 min, 10 runner-mins)
#     fmt -> clippy -> build sbproxy binary -> test -> doc.
#     The standalone `cargo build --workspace` step was removed:
#     `cargo clippy --all-targets` already builds all rlibs via the
#     check machinery, and `cargo build -p sbproxy` (kept) then
#     produces the binary the e2e harness spawns. `cargo test
#     --workspace` reuses the compiled artifacts for all remaining
#     steps. Without the explicit binary build, e2e tests that call
#     ProxyHarness::start_with_yaml() would fail because cargo test
#     does not guarantee binary-crate output files exist before the
#     test harnesses that reference them at runtime start executing.
#
#   release-build  (≈8 min, 9 runner-mins) -- push to main only
#     Release binary smoke test. Skipped on pull_request triggers so
#     PRs don't burn 8-9 runner-minutes twice (PR run + merge push).
#     Branch protection requires only `build / test`.
#
#   supply-chain  (≈40 s, 1 runner-min)
#     cargo-deny advisories + bans + licenses + sources.
#
#   crate-graph  (≈30 s, 1 runner-min)
#     Enforces the OSS-vs-enterprise crate-graph layering rule.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to no permissions; jobs that need more set their own.
# CodeQL (actions/missing-workflow-permissions) wants every workflow
# to declare its permissions explicitly rather than rely on the
# repo-level default.
permissions:
  contents: read

# Cancel superseded runs on the same ref so force-pushes don't burn
# minutes finishing the obsolete commit's jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build / test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Per-job permissions in addition to the workflow root block,
    # so the auth contract stays explicit if the root default ever
    # widens. CodeQL (actions/missing-workflow-permissions) prefers
    # this defense-in-depth shape.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!**.md'
              - '!docs/**'
              - '!examples/**'
              - '!LICENSE'
              - '!NOTICE'
              - '!.gitignore'
            observability:
              - 'crates/sbproxy-observe/**'
              - 'crates/sbproxy-modules/src/policy/**'
              - '.github/workflows/ci.yml'

      # The workspace's full target/ + ~/.cargo/registry/ tops 14 GB on
      # GitHub-hosted runners (tract-onnx, tokenizers, kube, pingora,
      # opentelemetry, etc), which crashes the rust-cache post-step on
      # `No space left on device`. Reclaim ~25 GB by removing
      # pre-installed tooling we don't use.
      - name: free disk space
        if: steps.filter.outputs.code == 'true'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - uses: dtolnay/rust-toolchain@stable
        if: steps.filter.outputs.code == 'true'
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        if: steps.filter.outputs.code == 'true'

      - name: install protoc and libclang
        if: steps.filter.outputs.code == 'true'
        # libclang-dev is needed for rquickjs-sys's bindgen build script.
        # Without it, clang's bundled stdbool.h is missing from the include
        # path and the build fails with `'stdbool.h' file not found`.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang

      - name: fmt
        if: steps.filter.outputs.code == 'true'
        run: cargo fmt --all -- --check

      # Reject internal tracker placeholders in source-available rustdoc.
      # A literal `WOR-XXX` is an unfinished TODO that announces incomplete
      # work without making it trackable. If a tracker reference is needed,
      # use a full URL or replace it with a descriptive sentence.
      - name: no internal tracker placeholders
        if: steps.filter.outputs.code == 'true'
        run: |
          if grep -rn 'WOR-XXX' crates/ --include='*.rs' --include='*.toml'; then
            echo "::error::WOR-XXX placeholders are not allowed; open a real ticket or rewrite as prose"
            exit 1
          fi

      - name: clippy
        if: steps.filter.outputs.code == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      # E2E tests are intentionally OUT OF SCOPE for the PR-required CI
      # lane. They spin up the full proxy binary, listen on real ports,
      # and exercise the network stack; on shared CI runners this leads
      # to startup-timeout flakiness (mesh gossip, websocket upgrade)
      # that does not signal a real regression. Run them locally with
      # `cargo test --workspace` after building the binary, or run them
      # nightly via the release-checks lane.
      #
      # The `--exclude sbproxy-e2e` flag keeps the rest of the
      # workspace's unit and harness-free integration tests in the
      # required lane so logic regressions still surface on every PR.
      - name: test (excludes e2e)
        if: steps.filter.outputs.code == 'true'
        run: cargo test --workspace --exclude sbproxy-e2e --locked

      # Build the sbproxy binary so the e2e harness tests below can
      # spawn it. cargo cannot infer the ordering between
      # `cargo test -p sbproxy-e2e` and the binary crate.
      - name: build sbproxy binary (for obs-budgets harness)
        if: steps.filter.outputs.code == 'true' && steps.filter.outputs.observability == 'true'
        run: cargo build -p sbproxy --locked

      # Cardinality + redaction regressions are easy to break silently
      # (a new label sneaks in, the limiter overflows into __other__,
      # a redactor regex misses a new shape). This canary runs only
      # when observability or policy code changed.
      - name: observability budgets (cardinality + redaction)
        if: steps.filter.outputs.code == 'true' && steps.filter.outputs.observability == 'true'
        run: |
          cargo test -p sbproxy-e2e --locked \
            --test cardinality \
            --test redaction

      - name: doc
        if: steps.filter.outputs.code == 'true'
        env:
          RUSTDOCFLAGS: -D warnings -D missing_docs
        run: cargo doc --workspace --no-deps --locked

  release-build:
    name: release build
    # Only run on pushes to main, not on pull_request events. Release
    # builds take 8-9 runner-minutes; skipping them on PRs saves those
    # minutes and avoids double-billing when a squash-merge PR lands
    # (the merge commit re-triggers on push anyway).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      # `sbproxy-classifiers` has a `build.rs` that runs `tonic-build`,
      # which needs `protoc` on PATH (added by PR #156, Classifier Judge
      # RPC). The main `build / test` job already installs it; the
      # release-build job is a separate runner so it needs the same
      # install.
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: build release binary
        run: cargo build --release -p sbproxy --locked

      - name: smoke test the binary
        run: |
          test -x target/release/sbproxy
          file target/release/sbproxy
          ls -lh target/release/sbproxy
          # Binary exits 1 with a usage banner when no args. Capture stderr,
          # confirm the banner is present, and treat exit 1 as success.
          ./target/release/sbproxy 2>&1 | tee /tmp/sb.out || true
          grep -q 'Usage: sbproxy' /tmp/sb.out

  supply-chain:
    name: supply chain (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      # Runs advisories + bans + licenses + sources against deny.toml.
      # See SUPPLY-CHAIN.md section 4.3 for the policy rationale.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          log-level: warn

  # --- Crate-graph layering gate ---
  # Enforces docs/adr-billing-hot-path-vs-async.md Rule 1: no OSS
  # workspace crate (sbproxy-rust/crates/*) may depend on any
  # sbproxy-enterprise-* crate. The proxy speaks only to LedgerClient;
  # rail-specific code (Stripe, MPP, x402, Lightning) lives behind
  # BillingRail and is consumed only by async workers in the
  # enterprise tree. A regression here breaks the PR.
  crate-graph:
    name: crate graph (hot/async layering)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: check crate graph
        run: bash scripts/check-crate-graph.sh

  # macOS regression coverage and single-threaded test-isolation runs
  # live in release-checks.yml and run on tag pushes plus
  # workflow_dispatch. Per-PR coverage is debug-test on Linux only.

  # ACME integration against Pebble and single-threaded test isolation
  # live in release-checks.yml and run on tag pushes plus
  # workflow_dispatch. Per-PR coverage is debug-test on Linux only.
  # macOS regression coverage is intentionally not in CI: developers
  # working on Darwin catch portability issues locally before pushing.
