# E2E tests for SBproxy. Runs on tag pushes, on a nightly schedule,
# and on manual dispatch. The PR-required CI lane (`ci.yml`) excludes
# `sbproxy-e2e` because the harness spawns the proxy binary, listens
# on real ports, and exercises the network stack; on shared GitHub
# runners that pattern produces startup-timeout flakiness that does
# not reflect a real regression. Gating e2e out of PRs keeps PR
# feedback fast while still validating the full stack before a
# release ships.

name: e2e

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  # Nightly run so this lane cannot rot silently between releases:
  # tag-only triggers mean a breakage introduced mid-cycle only
  # surfaces during the release itself. Failures do not page anyone;
  # GitHub emails the scheduled run's actor on failure, which is the
  # intended default.
  schedule:
    - cron: '30 9 * * *' # 09:30 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: e2e (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: e2e

      # The e2e harness spawns the proxy binary at runtime; cargo
      # cannot infer the ordering between the e2e crate and the
      # binary crate, so build it explicitly first.
      - name: build sbproxy binary
        run: cargo build -p sbproxy --locked

      # The no-default-features e2e harness (e.g. headless_detection_e2e's
      # disabled-feature test) spawns a separate binary built without
      # default features; build it into its own target dir so the harness
      # finds it.
      - name: build no-default-features sbproxy binary (e2e harness)
        run: CARGO_TARGET_DIR=target/no-default-features cargo build -p sbproxy --no-default-features --locked

      # Run single-threaded. Each e2e test spawns its own proxy process
      # with a full multi-core tokio runtime, so the default test-thread
      # count (= CPU count) massively oversubscribes the runner and makes
      # timing-sensitive tests (cache stale-while-revalidate, rate-limit
      # budget windows, ...) flake. The required single-threaded gate in
      # release-checks.yml runs the same suite green; match it here.
      - name: e2e
        run: cargo test -p sbproxy-e2e --locked -- --test-threads=1
