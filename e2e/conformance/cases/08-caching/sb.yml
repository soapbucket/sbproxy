proxy:
  http_bind_port: 18080

origins:
  "cached.test":
    action:
      type: proxy
      url: http://127.0.0.1:18888
    response_cache:
      enabled: true
      ttl: 60s
      stale_while_revalidate: 30s
      stale_if_error: 300s
      cacheable_methods:
        - GET
      cacheable_status:
        - 200
      max_size: 1048576
