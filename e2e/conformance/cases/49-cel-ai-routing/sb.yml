# CEL expressions in AI routing - dynamic provider/model selection
proxy:
  http_bind_port: 18080

origins:
  "cel-ai-route.test":
    action:
      type: ai_proxy
      skip_tls_verify_host: true
      default_model: gpt-4o-mini
      routing:
        strategy: round_robin
      providers:
        - name: mock-openai
          api_key: test-key
          base_url: http://127.0.0.1:18889/v1
          models:
            - gpt-4o-mini
            - gpt-4o
