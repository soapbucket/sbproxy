# Outlier detection via circuit breaker on load balancer targets
proxy:
  http_bind_port: 18080

origins:
  "outlier.test":
    action:
      type: load_balancer
      algorithm: round_robin
      targets:
        - url: http://127.0.0.1:18888/echo
          weight: 1
          circuit_breaker:
            enabled: true
            failure_threshold: 5
            success_threshold: 2
            timeout: 10s
            error_rate_threshold: 50.0
        - url: http://127.0.0.1:18888/echo
          weight: 1
          circuit_breaker:
            enabled: true
            failure_threshold: 5
            success_threshold: 2
            timeout: 10s
            error_rate_threshold: 50.0
