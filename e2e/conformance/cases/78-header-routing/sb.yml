# Header-based routing using load balancer with request matchers
proxy:
  http_bind_port: 18080

origins:
  "headerroute.test":
    action:
      type: load_balancer
      algorithm: first
      targets:
        - url: http://127.0.0.1:18888/echo?route=api
          weight: 1
          request_matchers:
            - headers:
                exact:
                  X-Route: api
          request_modifiers:
            - type: header
              set:
                X-Routed-To: api-backend
        - url: http://127.0.0.1:18888/echo?route=web
          weight: 1
          request_matchers:
            - headers:
                exact:
                  X-Route: web
          request_modifiers:
            - type: header
              set:
                X-Routed-To: web-backend
        - url: http://127.0.0.1:18888/echo?route=default
          weight: 1
          request_modifiers:
            - type: header
              set:
                X-Routed-To: default-backend
