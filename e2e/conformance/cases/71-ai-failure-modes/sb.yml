# AI proxy failure_mode and failure_overrides
proxy:
  http_bind_port: 18080

origins:
  # failure_mode: "closed" - block on any subsystem error
  "ai-closed.test":
    action:
      type: ai_proxy
      skip_tls_verify_host: true
      default_model: gpt-4o-mini
      failure_mode: closed
      providers:
        - name: mock-openai
          api_key: test-key
          base_url: http://127.0.0.1:18889/v1
          models:
            - gpt-4o-mini

  # failure_mode: "open" - allow degraded operation
  "ai-open.test":
    action:
      type: ai_proxy
      skip_tls_verify_host: true
      default_model: gpt-4o-mini
      failure_mode: open
      providers:
        - name: mock-openai
          api_key: test-key
          base_url: http://127.0.0.1:18889/v1
          models:
            - gpt-4o-mini
